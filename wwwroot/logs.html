<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>z3nIO | Logs</title>
    <link rel="stylesheet" href="/css/themes.css">
    <script src="/js/theme.js"></script>
    <script src="/js/nav.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 12px;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--bg1);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .header h1 { font-size: 18px; color: var(--accent); }

        .stats-bar { display: flex; gap: 20px; font-size: 11px; }

        .stat-item { display: flex; flex-direction: column; gap: 2px; }

        .stat-label {
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 10px;
        }

        .stat-value { color: var(--accent); font-weight: 600; font-size: 14px; }

        .controls {
            background: var(--bg1);
            padding: 8px 12px;
            margin: 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
            flex-shrink: 0;
        }

        .controls select,
        .controls input,
        .controls button {
            padding: 4px 10px;
            font-size: 11px;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
        }

        .controls button {
            background: var(--green-bg);
            border-color: rgba(240, 246, 252, 0.1);
            color: #fff;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        .controls button:hover { background: var(--green-bg2); }

        .controls button.danger {
            background: var(--red-bg);
            border-color: rgba(248, 81, 73, 0.4);
        }

        .controls button.danger:hover { filter: brightness(1.15); }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
            margin: 0 8px 8px 8px;
            gap: 8px;
        }

        .logs-list {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .logs-legend {
            display: grid;
            grid-template-columns: 70px 54px 100px 80px 55px 46px 46px 60px 54px 1fr;
            gap: 5px;
            padding: 3px 10px;
            background: var(--bg1);
            border-bottom: 1px solid var(--border);
            border-radius: 6px 6px 0 0;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .legend-cell {
            font-size: 9px;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
        }

        .logs-body {
            flex: 1;
            overflow-y: auto;
        }

        /* ---- single-line log row ---- */
        .log-row {
            padding: 4px 10px;
            border-bottom: 1px solid var(--bg2);
            border-left: 3px solid transparent;
            cursor: pointer;
            transition: background 0.12s;
            display: grid;
            grid-template-columns: 70px 54px 100px 80px 55px 46px 46px 60px 54px 1fr;
            gap: 5px;
            align-items: center;
            font-size: 11px;
            min-height: 0;
            position: relative;
        }

        .log-row:hover { background: var(--bg1); }
        .log-row.selected { background: var(--bg2); border-left-color: var(--accent); }

        .log-row.ERROR  { border-left-color: var(--red); background: var(--red-tint2); }
        .log-row.ERROR:hover  { background: var(--red-tint); }
        .log-row.WARNING { border-left-color: var(--yellow); }

        /* badges */
        .level {
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-align: center;
            font-family: ui-monospace, monospace;
            text-transform: uppercase;
        }
        .level.ERROR   { background: rgba(248, 81, 73, 0.15);  color: var(--red-lo); }
        .level.WARNING { background: rgba(210, 153, 34, 0.15); color: var(--yellow-lo); }
        .level.INFO    { background: rgba(56, 139, 253, 0.15);  color: var(--accent-lo); }
        .level.SUCCESS { background: rgba(63, 185, 80, 0.15);  color: var(--green-lo); }

        .ts   { color: var(--text3); font-family: ui-monospace, monospace; font-size: 10px; }
        .mach { color: var(--accent); background: rgba(56,139,253,0.12); padding: 1px 4px; border-radius: 4px; font-size: 10px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .proj { color: var(--purple); background: rgba(163,113,247,0.12); padding: 1px 4px; border-radius: 4px; font-size: 10px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .sess { color: var(--text3); font-family: ui-monospace, monospace; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .pid  { color: var(--text3); font-family: ui-monospace, monospace; font-size: 10px; }
        .port { color: var(--text3); font-family: ui-monospace, monospace; font-size: 10px; }
        .acc  { color: var(--green-hi); font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .orig { color: var(--text2); font-size: 10px; font-family: ui-monospace, monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* message: always one line, tooltip on hover for multiline */
        .msg {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text);
            font-size: 11px;
            cursor: copy;
            position: relative;
        }

        /* tooltip shown via JS-injected data-full, only when multiline flag set */
        .msg.multiline:hover::after {
            content: attr(data-full);
            position: fixed;
            left: var(--tip-x, 100px);
            top: var(--tip-y, 100px);
            max-width: 520px;
            background: var(--bg1);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 11px;
            color: var(--text);
            white-space: pre-wrap;
            word-break: break-word;
            z-index: 9999;
            line-height: 1.5;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        /* ---- details panel (same as http.html) ---- */
        .details-panel {
            width: 460px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            display: none;
            flex-direction: column;
            flex-shrink: 0;
        }

        .details-panel.visible { display: flex; }

        .details-header {
            padding: 10px 12px;
            background: var(--bg1);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .details-title { font-size: 13px; font-weight: 600; }

        .close-btn {
            background: transparent;
            border: none;
            color: var(--text2);
            cursor: pointer;
            font-size: 18px;
            padding: 0 4px;
            line-height: 1;
        }

        .close-btn:hover { color: var(--text); }

        .detail-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .info-row {
            display: grid;
            grid-template-columns: 90px 1fr;
            gap: 6px;
            align-items: start;
            font-size: 11px;
        }

        .info-label { color: var(--text2); }

        .info-value {
            color: var(--text);
            word-break: break-word;
        }

        .msg-full {
            background: var(--bg1);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px;
            font-family: ui-monospace, monospace;
            font-size: 11px;
            white-space: pre-wrap;
            word-break: break-word;
            line-height: 1.5;
            color: var(--text);
            max-height: 320px;
            overflow-y: auto;
        }

        .copy-btn {
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;
            align-self: flex-start;
        }

        .copy-btn:hover { background: var(--border); }

        .section-label {
            font-size: 9px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding-bottom: 4px;
            border-bottom: 1px solid var(--border);
        }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; border: 2px solid var(--bg); }
        ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
    </style>
</head>
<body>

<div class="header">
    <h1>Logs</h1>
    <div class="stats-bar">
        <div class="stat-item">
            <span class="stat-label">Shown</span>
            <span class="stat-value" id="statShown">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Errors</span>
            <span class="stat-value" style="color:var(--red-lo)" id="statErrors">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Warn</span>
            <span class="stat-value" style="color:var(--yellow-lo)" id="statWarn">0</span>
        </div>
    </div>
</div>

<div class="controls">
    <select id="logsLevelFilter" onchange="refresh()">
        <option value="">All Levels</option>
        <option value="ERROR">ERROR</option>
        <option value="WARNING">WARNING</option>
        <option value="INFO">INFO</option>
        <option value="SUCCESS">SUCCESS</option>
    </select>
    <select id="logsMachineFilter" onchange="refresh()"><option value="">All Machines</option></select>
    <select id="logsProjectFilter" onchange="refresh()"><option value="">All Projects</option></select>
    <select id="logsSessionFilter" onchange="refresh()"><option value="">Sessions</option></select>
    <select id="logsPortFilter" onchange="refresh()"><option value="">Ports</option></select>
    <select id="logsPidFilter" onchange="refresh()"><option value="">PIDs</option></select>
    <select id="logsAccountFilter" onchange="refresh()"><option value="">All Accounts</option></select>
    <select id="logsOriginFilter" onchange="refresh()"><option value="">All Origins</option></select>
    <select id="logsSessionAgeFilter" onchange="refresh()">
        <option value="">Any Uptime</option>
        <option value="10">10+ min</option>
        <option value="30">30+ min</option>
        <option value="60">1h+</option>
        <option value="180">3h+</option>
    </select>
    <input type="number" id="logsLimitInput" value="100" min="10" max="500" step="10" style="width:60px" onchange="refresh()">
    <button onclick="refresh()">&#128260;</button>
    <button onclick="toggleAutoRefresh()">&#9208;&#65039; <span id="autoStatus">ON</span></button>
    <button onclick="clearFilters()">&#10006;&#65039;</button>
    <button onclick="clearServer()" class="danger">&#128465;&#65039;</button>
</div>

<div class="container">
    <div class="logs-list">
        <div class="logs-legend">
            <span class="legend-cell">Time</span>
            <span class="legend-cell">Level</span>
            <span class="legend-cell">Machine</span>
            <span class="legend-cell">Project</span>
            <span class="legend-cell">Uptime</span>
            <span class="legend-cell">PID</span>
            <span class="legend-cell">Port</span>
            <span class="legend-cell">Account</span>
            <span class="legend-cell">Origin</span>
            <span class="legend-cell">Message</span>
        </div>
        <div class="logs-body" id="logsList"></div>
    </div>

    <div class="details-panel" id="detailsPanel">
        <div class="details-header">
            <span class="details-title">Log Details</span>
            <button class="close-btn" onclick="closeDetails()">x</button>
        </div>
        <div class="detail-body" id="detailBody"></div>
    </div>
</div>

<script>
    const SERVER = window.location.origin;
    let autoRefresh = true;
    let autoInterval = null;
    let selectedIdx = null;
    let currentLogs = [];

    // ---- PageState ----
    const PageState = (() => {
        const KEY = 'z3n8_logs_state';
        return {
            save(data) {
                try {
                    const prev = JSON.parse(sessionStorage.getItem(KEY) || '{}');
                    sessionStorage.setItem(KEY, JSON.stringify(Object.assign(prev, data)));
                } catch(e) {}
            },
            load() {
                try { return JSON.parse(sessionStorage.getItem(KEY) || '{}'); } catch(e) { return {}; }
            }
        };
    })();

    // ---- Fetch & render ----
    async function refresh() {
        const level      = document.getElementById('logsLevelFilter').value;
        const machine    = document.getElementById('logsMachineFilter').value;
        const project    = document.getElementById('logsProjectFilter').value;
        const session    = document.getElementById('logsSessionFilter').value;
        const port       = document.getElementById('logsPortFilter').value;
        const pid        = document.getElementById('logsPidFilter').value;
        const limit      = document.getElementById('logsLimitInput').value;
        const account    = document.getElementById('logsAccountFilter').value;
        const origin     = document.getElementById('logsOriginFilter').value;
        const sessionAge = document.getElementById('logsSessionAgeFilter').value;

        PageState.save({ level, machine, project, session, port, pid, account, origin, sessionAge, limit });

        let url = `${SERVER}/logs?limit=${limit}`;
        if (level)   url += `&level=${level}`;
        if (machine) url += `&machine=${encodeURIComponent(machine)}`;
        if (project) url += `&project=${encodeURIComponent(project)}`;
        if (session) url += `&session=${encodeURIComponent(session)}`;
        if (port)    url += `&port=${encodeURIComponent(port)}`;
        if (pid)     url += `&pid=${encodeURIComponent(pid)}`;
        if (account) url += `&account=${encodeURIComponent(account)}`;
        if (origin)  url += `&origin=${encodeURIComponent(origin)}`;

        try {
            const res = await fetch(url);
            let logs = await res.json();

            // client-side: filter by session age (uptime)
            if (sessionAge) {
                const minMs = parseInt(sessionAge) * 60 * 1000;
                const now = Date.now();
                logs = logs.filter(log => {
                    const start = sessionStartMs(log.session);
                    if (start === null) return false;
                    return (now - start) >= minMs;
                });
            }

            currentLogs = logs;
            renderLogs(currentLogs);
            await updateFilters();
        } catch(e) {
            console.error('Logs refresh failed:', e);
        }
    }

    // session value → unix ms start time (or null if not parseable)
    function sessionStartMs(session) {
        const n = parseInt(session);
        if (isNaN(n) || n < 1000000000) return null;
        return n > 9999999999 ? n : n * 1000;
    }

    function formatDuration(ms) {
        if (ms < 0) ms = 0;
        const s = Math.floor(ms / 1000);
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const sec = s % 60;
        if (h > 0)
            return `${h}h ${String(m).padStart(2,'0')}m`;
        return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    }

    // tick: update all visible .sess-timer spans
    function tickSessionTimers() {
        const now = Date.now();
        document.querySelectorAll('.sess-timer').forEach(el => {
            const start = parseInt(el.dataset.start);
            if (!isNaN(start)) el.textContent = formatDuration(now - start);
        });
        // detail panel uptime
        const du = document.getElementById('detailUptime');
        if (du && du.dataset.start) {
            du.textContent = formatDuration(now - parseInt(du.dataset.start));
        }
    }
    setInterval(tickSessionTimers, 1000);

    function escHtml(t) {
        const d = document.createElement('div');
        d.textContent = t;
        return d.innerHTML;
    }

    function renderLogs(logs) {
        let errors = 0, warns = 0;
        const html = logs.map((log, idx) => {
            if (log.level === 'ERROR')   errors++;
            if (log.level === 'WARNING') warns++;

            const msg = log.message || '';
            const isMulti = msg.includes('\n') || msg.length > 120;
            const oneLine = msg.replace(/\n/g, ' ');
            const multiAttr = isMulti
                ? ` data-full="${escHtml(msg)}" data-idx="${idx}"`
                : ` data-idx="${idx}"`;
            const multiClass = isMulti ? ' multiline' : '';

            const sel = idx === selectedIdx ? ' selected' : '';

            return `<div class="log-row ${log.level}${sel}" data-idx="${idx}" onclick="selectLog(${idx})">
                <span class="ts">${new Date(log.timestamp).toLocaleTimeString()}</span>
                <span class="level ${log.level}">${log.level}</span>
                <span class="mach" title="${escHtml(log.machine)}">${escHtml(log.machine)}</span>
                <span class="proj" title="${escHtml(log.project)}">${escHtml(log.project)}</span>
                <span class="sess" title="${escHtml(String(log.session))}">${(() => {
                const start = sessionStartMs(log.session);
                if (start === null) return `<span class="sess-timer">${escHtml(String(log.session))}</span>`;
                const dur = formatDuration(Date.now() - start);
                return `<span class="sess-timer" data-start="${start}">${dur}</span>`;
            })()}</span>
                <span class="pid">pid:${log.pid}</span>
                <span class="port">:${log.port}</span>
                <span class="acc" title="${escHtml(log.account || '')}">${escHtml(log.account || '-')}</span>
                <span class="orig" title="${escHtml(log.origin || '')}">${escHtml(log.origin || '-')}</span>
                <span class="msg${multiClass}"${multiAttr} onclick="copyMsg(event, ${idx})">${escHtml(oneLine)}</span>
            </div>`;
        }).join('');

        document.getElementById('logsList').innerHTML = html;
        document.getElementById('statShown').textContent = logs.length;
        document.getElementById('statErrors').textContent = errors;
        document.getElementById('statWarn').textContent = warns;

        // track mouse position for tooltip anchor
        document.querySelectorAll('.msg.multiline').forEach(el => {
            el.addEventListener('mousemove', e => {
                el.style.setProperty('--tip-x', (e.clientX + 12) + 'px');
                el.style.setProperty('--tip-y', (e.clientY + 8) + 'px');
            });
        });
    }

    function copyMsg(e, idx) {
        e.stopPropagation();
        const msg = (currentLogs[idx] || {}).message || '';
        if (!msg) return;
        navigator.clipboard.writeText(msg).then(() => {
            const el = e.currentTarget;
            const orig = el.style.color;
            el.style.color = 'var(--green-lo)';
            setTimeout(() => { el.style.color = orig; }, 600);
        });
    }

    function selectLog(idx) {
        selectedIdx = idx;
        document.querySelectorAll('.log-row').forEach(r => r.classList.remove('selected'));
        const row = document.querySelector(`.log-row[data-idx="${idx}"]`);
        if (row) row.classList.add('selected');
        renderDetails(currentLogs[idx]);
    }

    function renderDetails(log) {
        if (!log) return;
        const panel = document.getElementById('detailsPanel');
        panel.classList.add('visible');

        const extra = log.extra ? JSON.stringify(log.extra, null, 2) : '';

        document.getElementById('detailBody').innerHTML = `
            <div class="section-label">Meta</div>
            <div class="info-row"><span class="info-label">Timestamp</span><span class="info-value">${new Date(log.timestamp).toLocaleString()}</span></div>
            <div class="info-row"><span class="info-label">Level</span><span class="level ${log.level}" style="width:fit-content">${log.level}</span></div>
            <div class="info-row"><span class="info-label">Machine</span><span class="info-value mach" style="background:none;padding:0">${escHtml(log.machine)}</span></div>
            <div class="info-row"><span class="info-label">Project</span><span class="info-value proj" style="background:none;padding:0">${escHtml(log.project)}</span></div>
            <div class="info-row"><span class="info-label">Account</span><span class="info-value" style="color:var(--green-hi)">${escHtml(log.account || '-')}</span></div>
            <div class="info-row"><span class="info-label">Session</span><span class="info-value" style="font-family:monospace;font-size:10px">${escHtml(String(log.session))}</span></div>
            <div class="info-row"><span class="info-label">Uptime</span><span class="info-value" style="font-family:monospace" id="detailUptime" ${(() => { const s = sessionStartMs(log.session); return s ? `data-start="${s}"` : ''; })()}>${(() => { const s = sessionStartMs(log.session); return s ? formatDuration(Date.now() - s) : '-'; })()}</span></div>
            <div class="info-row"><span class="info-label">PID</span><span class="info-value" style="font-family:monospace">${log.pid}</span></div>
            <div class="info-row"><span class="info-label">Port</span><span class="info-value" style="font-family:monospace">${log.port}</span></div>
            <div class="info-row"><span class="info-label">Origin</span><span class="info-value" style="font-family:monospace;color:var(--text2)">${escHtml(log.origin || '-')}</span></div>
            <div class="section-label" style="margin-top:4px">Message</div>
            <div class="msg-full" id="detailMsg">${escHtml(log.message || '')}</div>
            <button class="copy-btn" onclick="copyDetailMsg(this)">&#128203; Copy</button>
            ${extra ? `<div class="section-label" style="margin-top:4px">Extra</div><div class="msg-full">${escHtml(extra)}</div>` : ''}
        `;
    }

    function copyDetailMsg(btn) {
        const text = document.getElementById('detailMsg').innerText;
        navigator.clipboard.writeText(text).then(() => {
            const orig = btn.textContent;
            btn.textContent = 'Copied!';
            btn.style.background = 'rgba(63,185,80,0.2)';
            setTimeout(() => { btn.textContent = orig; btn.style.background = ''; }, 1400);
        });
    }

    function closeDetails() {
        document.getElementById('detailsPanel').classList.remove('visible');
        selectedIdx = null;
        document.querySelectorAll('.log-row').forEach(r => r.classList.remove('selected'));
    }

    // ---- Filters ----
    async function updateFilters() {
        try {
            const res = await fetch(`${SERVER}/stats`);
            const stats = await res.json();

            const restore = id => document.getElementById(id).value;

            function repopulate(id, items, prefix) {
                const sel = document.getElementById(id);
                const cur = sel.value;
                sel.innerHTML = `<option value="">${prefix}</option>` +
                    Object.keys(items || {}).map(v =>
                        `<option value="${v}" ${v === cur ? 'selected' : ''}>${v}</option>`
                    ).join('');
            }

            repopulate('logsMachineFilter', stats.byMachine, 'All Machines');
            repopulate('logsProjectFilter', stats.byProject, 'All Projects');
            repopulate('logsAccountFilter', stats.byAccount, 'All Accounts');
            repopulate('logsOriginFilter',  stats.byOrigin,  'All Origins');

            if (stats.bySession) {
                const keys = Object.keys(stats.bySession).sort((a,b) => b - a);
                const sel = document.getElementById('logsSessionFilter');
                const cur = sel.value;
                sel.innerHTML = `<option value="">Sessions</option>` +
                    keys.map(v => `<option value="${v}" ${v === cur ? 'selected' : ''}>${v}</option>`).join('');
            }
            if (stats.byPort) {
                const keys = Object.keys(stats.byPort).filter(p => p !== '').sort();
                const sel = document.getElementById('logsPortFilter');
                const cur = sel.value;
                sel.innerHTML = `<option value="">Ports</option>` +
                    keys.map(v => `<option value="${v}" ${v === cur ? 'selected' : ''}>${v}</option>`).join('');
            }
            if (stats.byPid) {
                const keys = Object.keys(stats.byPid).filter(p => p !== '').sort((a,b) => b - a);
                const sel = document.getElementById('logsPidFilter');
                const cur = sel.value;
                sel.innerHTML = `<option value="">PIDs</option>` +
                    keys.map(v => `<option value="${v}" ${v === cur ? 'selected' : ''}>${v}</option>`).join('');
            }
        } catch(e) {
            console.error('Stats failed:', e);
        }
    }

    function toggleAutoRefresh() {
        autoRefresh = !autoRefresh;
        document.getElementById('autoStatus').textContent = autoRefresh ? 'ON' : 'OFF';
        if (autoRefresh) {
            autoInterval = setInterval(refresh, 3000);
        } else {
            clearInterval(autoInterval);
        }
    }

    function clearFilters() {
        ['logsLevelFilter','logsMachineFilter','logsProjectFilter',
            'logsSessionFilter','logsPortFilter','logsPidFilter','logsAccountFilter',
            'logsOriginFilter','logsSessionAgeFilter'].forEach(id => {
            document.getElementById(id).value = '';
        });
        refresh();
    }

    async function clearServer() {
        if (!await Dialog.confirm('Delete all logs?')) return;
        try {
            await fetch(`${SERVER}/clear`, { method: 'POST' });
            refresh();
        } catch(e) { console.error('Clear failed:', e); }
    }

    // ---- Init ----
    const _s = PageState.load();
    if (_s.level)   document.getElementById('logsLevelFilter').value   = _s.level;
    if (_s.limit)   document.getElementById('logsLimitInput').value    = _s.limit;

    refresh();
    autoInterval = setInterval(refresh, 3000);
</script>
</body>
</html>
