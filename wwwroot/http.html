<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>z3nIO | HTTP</title>
    <link rel="stylesheet" href="/css/themes.css">
    <script src="/js/theme.js"></script>
    <script src="/js/nav.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 12px;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--bg1);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 18px;
            color: var(--accent);
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            font-size: 11px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .stat-label {
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 10px;
        }

        .stat-value {
            color: var(--accent);
            font-weight: 600;
            font-size: 14px;
        }

        .controls {
            background: var(--bg1);
            padding: 8px 12px;
            margin: 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .controls select,
        .controls input,
        .controls button {
            padding: 4px 12px;
            font-size: 12px;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-family: inherit;
        }

        .controls button {
            background: var(--green-bg);
            border-color: rgba(240, 246, 252, 0.1);
            color: #ffffff;
            cursor: pointer;
            font-weight: 500;
            transition: background 0.2s;
        }

        .controls button:hover {
            background: var(--green-bg2);
        }

        .controls button.danger {
            background: var(--red-bg);
            border-color: rgba(248, 81, 73, 0.4);
        }

        .controls button.danger:hover {
            background: var(--red-bg);
            filter: brightness(1.15);
        }

        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
            margin: 0 8px 8px 8px;
            gap: 8px;
        }

        .requests-list {
            flex: 1;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow-y: auto;
        }

        /* ── DETAILS PANEL ── */
        .details-panel {
            width: 500px;
            min-height: 0;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            display: none;
            flex-direction: column;
            overflow: hidden;
            align-self: stretch;
        }

        .details-panel.visible {
            display: flex;
        }

        .details-header {
            padding: 10px 12px;
            background: var(--bg1);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .details-title {
            font-size: 13px;
            font-weight: 600;
        }

        .close-btn {
            background: transparent;
            border: none;
            color: var(--text2);
            cursor: pointer;
            font-size: 18px;
            padding: 0 8px;
        }

        .close-btn:hover { color: var(--text); }

        /* ── DETAILS SCROLLABLE BODY ── */
        .details-body {
            flex: 1;
            overflow-y: auto;
            padding: 10px 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* ── OVERVIEW SECTION ── */
        .ov-url {
            font-family: monospace;
            font-size: 11px;
            color: var(--text);
            word-break: break-all;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }

        .ov-badges {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-items: center;
        }

        .ov-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            align-items: center;
        }

        /* reuse method/status badge styles */
        .badge-method {
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            font-family: monospace;
        }
        .badge-method.GET    { background: rgba(88, 166, 255, 0.15); color: var(--accent-lo); }
        .badge-method.POST   { background: rgba(63, 185, 80, 0.15);  color: var(--green-lo); }
        .badge-method.PUT    { background: rgba(210, 153, 34, 0.15); color: var(--yellow-lo); }
        .badge-method.DELETE { background: rgba(248, 81, 73, 0.15);  color: var(--red-lo); }
        .badge-method.PATCH  { background: rgba(210, 153, 34, 0.15); color: var(--yellow-lo); }
        .badge-method.HEAD   { background: rgba(88, 166, 255, 0.15); color: var(--accent-lo); }

        .badge-status {
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            font-family: monospace;
        }
        .badge-status.s2xx { background: rgba(63, 185, 80, 0.15);  color: var(--green-lo); }
        .badge-status.s3xx { background: rgba(88, 166, 255, 0.15); color: var(--accent-lo); }
        .badge-status.s4xx { background: rgba(210, 153, 34, 0.15); color: var(--yellow-lo); }
        .badge-status.s5xx { background: rgba(248, 81, 73, 0.15);  color: var(--red-lo); }
        .badge-status.s0xx { background: rgba(248, 81, 73, 0.12);  color: var(--red-lo); }

        .badge-duration {
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            font-family: monospace;
            background: rgba(163, 113, 247, 0.12);
            color: #a371f7;
        }

        .badge-meta {
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 500;
            background: var(--bg2);
            color: var(--text2);
            font-family: monospace;
        }

        .badge-origin {
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 500;
            background: rgba(41, 182, 246, 0.1);
            color: #29b6f6;
            font-family: monospace;
        }

        /* ── ACTION BUTTONS ── */
        .action-rows {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .action-row {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }

        .act-btn {
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid;
            font-family: inherit;
            transition: filter 0.15s;
        }
        .act-btn:hover { filter: brightness(1.2); }

        .act-btn.play     { background: rgba(63,185,80,0.15);   border-color: rgba(63,185,80,0.4);    color: var(--green-lo); }
        .act-btn.api-sk   { background: rgba(255,123,114,0.12); border-color: rgba(255,123,114,0.4);  color: #ff7b72; }
        .act-btn.api-ex   { background: rgba(255,123,114,0.12); border-color: rgba(255,123,114,0.4);  color: #ff7b72; }
        .act-btn.httpcl   { background: rgba(88,166,255,0.12);  border-color: rgba(88,166,255,0.4);   color: var(--accent-lo); }
        .act-btn.zp7      { background: rgba(63,185,80,0.12);   border-color: rgba(63,185,80,0.4);    color: var(--green-lo); }
        .act-btn.hybrid   { background: rgba(210,153,34,0.12);  border-color: rgba(210,153,34,0.4);   color: var(--yellow-lo); }
        .act-btn.python   { background: rgba(255,166,88,0.12);  border-color: rgba(255,166,88,0.4);   color: #f0883e; }
        .act-btn.ts       { background: rgba(41,182,246,0.12);  border-color: rgba(41,182,246,0.4);   color: #29b6f6; }
        .act-btn.curl     { background: rgba(163,113,247,0.12); border-color: rgba(163,113,247,0.4);  color: #a371f7; }

        /* ── COLLAPSIBLE SECTIONS ── */
        .detail-section {
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }

        .section-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: var(--bg1);
            cursor: pointer;
            user-select: none;
            font-size: 11px;
            font-weight: 600;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .section-toggle:hover { background: var(--bg2); }

        .section-arrow {
            font-size: 9px;
            transition: transform 0.15s;
            color: var(--text3);
        }
        .section-toggle.open .section-arrow { transform: rotate(90deg); }

        .section-body {
            display: none;
        }
        .section-body.open {
            display: block;
        }

        /* ── SUBSECTIONS (headers / body) ── */
        .subsection-toggle {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            cursor: pointer;
            user-select: none;
            font-size: 10px;
            font-weight: 600;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--bg2);
            background: var(--bg);
        }
        .subsection-toggle:hover { background: var(--bg1); }

        .subsection-arrow {
            font-size: 8px;
            transition: transform 0.15s;
        }
        .subsection-toggle.open .subsection-arrow { transform: rotate(90deg); }

        .subsection-body {
            display: none;
        }
        .subsection-body.open {
            display: block;
        }

        /* ── HEADER ITEMS (clickable copy) ── */
        .header-list {
            background: var(--bg);
        }

        .header-item {
            padding: 5px 10px;
            border-bottom: 1px solid var(--bg2);
            display: grid;
            grid-template-columns: 150px 1fr;
            gap: 6px;
            font-family: monospace;
            font-size: 11px;
            cursor: pointer;
            transition: background 0.1s;
        }
        .header-item:last-child { border-bottom: none; }
        .header-item:hover { background: var(--bg2); }

        .header-key {
            color: var(--green-hi);
        }

        .header-value {
            color: var(--text);
            word-break: break-all;
        }

        /* ── BODY BLOCK ── */
        .body-block {
            max-height: 400px;
            overflow-y: auto;
            background: var(--bg);
            padding: 8px 10px;
            font-family: monospace;
            font-size: 11px;
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--text);
            cursor: pointer;
            transition: background 0.1s;
            min-height: 24px;
        }
        .body-block:hover { background: var(--bg1); }

        .cookies-block {
            max-height: 200px;      /* <-- добавить */
            overflow-y: auto;       /* <-- добавить */
            background: var(--bg);
            padding: 8px 10px;
            font-family: monospace;
            font-size: 11px;
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--yellow-lo);
            cursor: pointer;
            transition: background 0.1s;
        }
        .cookies-block:hover { background: var(--bg1); }

        .empty-note {
            color: var(--text3);
            font-style: italic;
            padding: 8px 10px;
            font-size: 11px;
        }

        /* ── COPY FLASH ── */
        .flash-copied {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(63,185,80,0.2);
            border: 1px solid rgba(63,185,80,0.4);
            color: var(--green-lo);
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 9999;
        }
        .flash-copied.show { opacity: 1; }

        /* ── LIST ITEMS ── */
        .request-item {
            padding: 6px 12px;
            border-bottom: 1px solid var(--bg2);
            cursor: pointer;
            transition: background 0.15s;
            display: grid;
            grid-template-columns: 80px 60px auto 60px 80px 100px;
            gap: 6px;
            align-items: center;
        }

        .request-item:hover { background: var(--bg1); }

        .request-item.selected {
            background: var(--bg2);
            border-left: 3px solid var(--accent);
        }

        .method {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
            font-family: monospace;
        }

        .method.GET    { background: rgba(88, 166, 255, 0.15); color: var(--accent-lo); }
        .method.POST   { background: rgba(63, 185, 80, 0.15);  color: var(--green-lo); }
        .method.PUT    { background: rgba(210, 153, 34, 0.15); color: var(--yellow-lo); }
        .method.DELETE { background: rgba(248, 81, 73, 0.15);  color: var(--red-lo); }

        .status {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-align: center;
            font-family: monospace;
        }

        .status.s2xx { background: rgba(63, 185, 80, 0.15);  color: var(--green-lo); }
        .status.s3xx { background: rgba(88, 166, 255, 0.15); color: var(--accent-lo); }
        .status.s4xx { background: rgba(210, 153, 34, 0.15); color: var(--yellow-lo); }
        .status.s5xx { background: rgba(248, 81, 73, 0.15);  color: var(--red-lo); }

        .url {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: var(--text);
        }

        .duration {
            color: var(--text2);
            font-family: monospace;
            font-size: 11px;
            text-align: right;
        }

        .timestamp {
            color: var(--text3);
            font-family: monospace;
            font-size: 10px;
        }

        .account {
            color: var(--green-hi);
            font-size: 11px;
        }

        /* ── PLAY MODAL ── */
        .play-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .play-modal-overlay.show { display: flex; }
        .play-modal { background: var(--bg1); border: 1px solid var(--border); border-radius: 10px; width: 900px; max-width: 96vw; height: 88vh; display: flex; flex-direction: column; overflow: hidden; }
        .play-modal-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .play-modal-title { font-weight: 700; font-size: 13px; color: var(--text); }
        .play-modal-close { background: none; border: none; color: var(--text2); cursor: pointer; font-size: 16px; padding: 0 4px; line-height: 1; }
        .play-modal-close:hover { color: var(--text); }
        .play-modal-url-row { display: flex; gap: 6px; padding: 8px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; align-items: center; }
        .play-modal-body { display: flex; gap: 0; flex: 1; overflow: hidden; }
        .play-modal-left { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); overflow: hidden; }
        .play-modal-right { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .play-modal-label { font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; padding: 6px 12px 4px; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .play-modal-area { flex: 1; background: var(--bg); border: none; outline: none; color: var(--text); font-family: monospace; font-size: 10.5px; padding: 8px 12px; resize: none; line-height: 1.5; }
        .play-modal-footer { padding: 8px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

        .play-method-select {
            background: var(--bg2); border: 1px solid var(--border); color: var(--text);
            font-family: inherit; font-size: 11px; padding: 4px 6px; border-radius: 4px; outline: none;
        }
        .play-url-input {
            flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text);
            font-family: monospace; font-size: 11px; padding: 4px 8px; border-radius: 4px; outline: none;
        }
        .play-url-input:focus { border-color: var(--accent); }
        .play-send-btn {
            background: var(--green-bg); border: 1px solid rgba(240,246,252,0.1); color: #fff;
            padding: 4px 14px; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 11px;
            font-weight: 600; transition: background 0.2s; white-space: nowrap;
        }
        .play-send-btn:hover { background: var(--green-bg2); }
        .play-textarea {
            width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
            font-family: monospace; font-size: 10.5px; padding: 6px 8px; border-radius: 4px;
            outline: none; resize: vertical; line-height: 1.5; min-height: 60px;
        }
        .play-textarea:focus { border-color: var(--accent); }
        .play-response-area {
            flex: 1; width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
            font-family: monospace; font-size: 10.5px; padding: 6px 8px; border-radius: 4px;
            outline: none; resize: none; line-height: 1.5; min-height: 80px;
        }
        .play-status { font-size: 10px; color: var(--text2); margin-left: auto; }
        .play-status.ok  { color: var(--green-lo); }
        .play-status.err { color: var(--red-lo); }

        .copy-btn {
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        .copy-btn:hover { background: var(--border); }

        .status-2xx { color: var(--green-lo); }
        .status-3xx { color: var(--accent-lo); }
        .status-4xx { color: var(--yellow-lo); }
        .status-5xx { color: var(--red-lo); }

        ::-webkit-scrollbar { width: 12px; height: 12px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; border: 2px solid var(--bg); }
        ::-webkit-scrollbar-thumb:hover { background: var(--muted); }
    </style>
</head>
<body>

<div class="header">
    <h1>HTTP</h1>
    <div class="stats-bar">
        <div class="stat-item">
            <span class="stat-label">Total</span>
            <span class="stat-value" id="totalRequests">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Success</span>
            <span class="stat-value" style="color: var(--green-lo);" id="successRate">0%</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Avg Time</span>
            <span class="stat-value" id="avgTime">0ms</span>
        </div>
    </div>
</div>

<div class="controls">
    <select id="methodFilter" onchange="refresh()">
        <option value="">All Methods</option>
        <option value="GET">GET</option>
        <option value="POST">POST</option>
        <option value="PUT">PUT</option>
        <option value="DELETE">DELETE</option>
    </select>

    <select id="statusFilter" onchange="refresh()">
        <option value="">All Statuses</option>
        <option value="2">2xx Success</option>
        <option value="3">3xx Redirect</option>
        <option value="4">4xx Client Error</option>
        <option value="5">5xx Server Error</option>
    </select>

    <input type="text" id="urlFilter" placeholder="Filter by URL..." onkeyup="refresh()">

    <select id="machineFilter" onchange="refresh()">
        <option value="">All Machines</option>
    </select>

    <select id="projectFilter" onchange="refresh()">
        <option value="">All Projects</option>
    </select>

    <input type="number" id="limitInput" value="200" min="10" max="1000" step="10" onchange="refresh()">

    <button onclick="refresh()">🔄 Refresh</button>
    <button onclick="toggleAutoRefresh()">⏸️ Auto: <span id="autoStatus">ON</span></button>
    <button onclick="clearFilters()">✖️ Reset</button>
    <button onclick="clearLogs()" class="danger">🗑️ Clear Logs</button>
    <button onclick="openCurlImport()" style="background:rgba(163,113,247,0.2);border-color:rgba(163,113,247,0.4);color:#a371f7">&#x2B07; cURL Import</button>
</div>

<div class="container">
    <div class="requests-list" id="requestsList"></div>

    <div class="details-panel" id="detailsPanel">
        <div class="details-header">
            <span class="details-title">Request Details</span>
            <button class="close-btn" onclick="closeDetails()">×</button>
        </div>

        <div class="details-body" id="detailsBody"></div>
    </div>
</div>

<!-- PLAY MODAL -->
<div class="play-modal-overlay" id="playModalOverlay" onclick="closePlayModalOnBg(event)">
    <div class="play-modal">
        <div class="play-modal-header">
            <span class="play-modal-title">⚡ Request Replay</span>
            <button class="play-modal-close" onclick="closePlayModal()">✕</button>
        </div>
        <div class="play-modal-url-row">
            <select class="play-method-select" id="playMethod">
                <option>GET</option><option>POST</option><option>PUT</option>
                <option>DELETE</option><option>PATCH</option><option>HEAD</option>
            </select>
            <input class="play-url-input" id="playUrl" placeholder="https://..." />
            <button class="play-send-btn" onclick="sendPlay()">&#9654; Send</button>
            <span class="play-status" id="playStatus"></span>
        </div>
        <div class="play-modal-body">
            <div class="play-modal-left">
                <div class="play-modal-label">Headers (one per line, Key: Value)</div>
                <textarea class="play-textarea play-modal-area" id="playHeaders" placeholder="Content-Type: application/json&#10;Authorization: Bearer token..."></textarea>
                <div class="play-modal-label" style="border-top:1px solid var(--border)">Body (JSON)</div>
                <textarea class="play-textarea play-modal-area" id="playBody" style="flex:0 0 130px" placeholder='{"key": "value"}'></textarea>
            </div>
            <div class="play-modal-right">
                <div class="play-modal-label">Response</div>
                <textarea class="play-textarea play-modal-area" id="playResponse" readonly placeholder="Response will appear here..."></textarea>
            </div>
        </div>
        <div class="play-modal-footer">
            <button class="copy-btn" onclick="copyPlayResponse(this)">&#x1F4CB; Copy response</button>
            <button class="copy-btn" onclick="copyCurlBtn2(this)">&#x1F4CB; cURL</button>
        </div>
    </div>
</div>

<!-- COPY FLASH -->
<div class="flash-copied" id="flashCopied">Copied!</div>

<script>
    const SERVER = window.location.origin;
    const REPLAY_SERVER = (() => {
        const u = new URL(window.location.href);
        const replayPort = parseInt(u.port || '80') + 1;
        return `${u.protocol}//${u.hostname}:${replayPort}`;
    })();
    let autoRefresh = true;
    let refreshAbortController = null;
    let playAbortController = null;
    let _sse = null;
    let selectedRequest = null;
    let selectedIdx = null;
    let currentLogs = [];

    // ── save/restore filters ──
    function saveFilters() {
        PageState.save({
            methodFilter:  document.getElementById('methodFilter').value,
            statusFilter:  document.getElementById('statusFilter').value,
            urlFilter:     document.getElementById('urlFilter').value,
            machineFilter: document.getElementById('machineFilter').value,
            projectFilter: document.getElementById('projectFilter').value,
            limitInput:    document.getElementById('limitInput').value,
            autoRefresh:   autoRefresh,
            selectedIdx:   selectedIdx
        });
    }

    // ── flash notification ──
    function flashCopied() {
        const el = document.getElementById('flashCopied');
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 1200);
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text).then(flashCopied);
    }

    // ── collapsible helper ──
    function toggleSection(toggleEl) {
        const isOpen = toggleEl.classList.contains('open');
        const body = toggleEl.nextElementSibling;
        if (isOpen) {
            toggleEl.classList.remove('open');
            body.classList.remove('open');
        } else {
            toggleEl.classList.add('open');
            body.classList.add('open');
        }
    }

    async function refresh() {
        const method  = document.getElementById('methodFilter').value;
        const status  = document.getElementById('statusFilter').value;
        const url     = document.getElementById('urlFilter').value;
        const machine = document.getElementById('machineFilter').value;
        const project = document.getElementById('projectFilter').value;
        const limit   = document.getElementById('limitInput').value;
        saveFilters();

        let apiUrl = `${SERVER}/traffic-logs?limit=${limit}`;
        if (method)  apiUrl += `&method=${method}`;
        if (status)  apiUrl += `&status=${status}`;
        if (url)     apiUrl += `&url=${encodeURIComponent(url)}`;
        if (machine) apiUrl += `&machine=${encodeURIComponent(machine)}`;
        if (project) apiUrl += `&project=${encodeURIComponent(project)}`;

        try {
            refreshAbortController = new AbortController();
            const response = await fetch(apiUrl, { signal: refreshAbortController.signal });
            let logs = await response.json();

            if (method)  logs = logs.filter(l => l.method === method);
            if (status)  logs = logs.filter(l => String(l.statusCode || '').startsWith(status));
            if (url)     logs = logs.filter(l => (l.url || '').toLowerCase().includes(url.toLowerCase()));
            if (machine) logs = logs.filter(l => (l.machine || '') === machine);
            if (project) logs = logs.filter(l => (l.project || '') === project);

            currentLogs = logs;
            renderRequests(currentLogs);
            await updateStats();
            // Restore machine/project after stats populated their selects
            const _st = PageState.load();
            if (_st.machineFilter) document.getElementById('machineFilter').value = _st.machineFilter;
            if (_st.projectFilter) document.getElementById('projectFilter').value = _st.projectFilter;
            // Re-open detail panel for previously selected row
            if (_st.detailsVisible && _st.selectedIdx != null && currentLogs[_st.selectedIdx]) {
                showDetails(_st.selectedIdx);
            }
        } catch (e) {
            if (e.name === 'AbortError') return;
            console.error('Refresh failed:', e);
        }
    }

    function renderRequests(logs) {
        const container = document.getElementById('requestsList');
        container.innerHTML = logs.map((log, idx) => {
            const statusClass = log.statusCode >= 200 && log.statusCode < 300 ? 's2xx' :
                log.statusCode >= 300 && log.statusCode < 400 ? 's3xx' :
                    log.statusCode >= 400 && log.statusCode < 500 ? 's4xx' : 's5xx';

            const time = new Date(log.timestamp).toLocaleTimeString();
            const duration = log.durationMs ? `${log.durationMs}ms` : '-';

            return `
            <div class="request-item" onclick="showDetails(${idx})">
                <span class="timestamp">${time}</span>
                <span class="method ${log.method}">${log.method}</span>
                <span class="url" title="${escapeHtml(log.url)}">${escapeHtml(truncate(log.url, 60))}</span>
                <span class="status ${statusClass}">${log.statusCode}</span>
                <span class="duration">${duration}</span>
                <span class="account">${log.account || '-'}</span>
            </div>
        `;
        }).join('');
    }

    function showDetails(idx) {
        selectedRequest = currentLogs[idx];
        selectedIdx = idx;
        const panel = document.getElementById('detailsPanel');
        panel.classList.add('visible');
        const container = panel.parentElement;
        if (container) panel.style.height = container.clientHeight + 'px';

        document.querySelectorAll('.request-item').forEach((el, i) => {
            el.classList.toggle('selected', i === idx);
        });

        renderDetails();
        PageState.save({ selectedIdx: idx, detailsVisible: true });
    }

    function closeDetails() {
        const panel = document.getElementById('detailsPanel');
        panel.classList.remove('visible');
        panel.style.height = '';
        document.querySelectorAll('.request-item').forEach(el => el.classList.remove('selected'));
        selectedRequest = null;
        selectedIdx = null;
        PageState.save({ selectedIdx: null, detailsVisible: false });
    }

    // ── STATUS BADGE CLASS ──
    function statusBadgeClass(code) {
        if (code >= 200 && code < 300) return 's2xx';
        if (code >= 300 && code < 400) return 's3xx';
        if (code >= 400 && code < 500) return 's4xx';
        if (code >= 500) return 's5xx';
        return 's0xx';
    }

    function methodBadgeClass(m) {
        return ['GET','POST','PUT','DELETE','PATCH','HEAD'].includes(m) ? m : 'GET';
    }

    function isEmpty(val) {
        return val === null || val === undefined || val === '' || val === '-';
    }

    // ── MAIN RENDER ──
    function renderDetails() {
        if (!selectedRequest) return;
        const r = selectedRequest;
        const body = document.getElementById('detailsBody');
        body.innerHTML = '';

        // URL
        const urlDiv = document.createElement('div');
        urlDiv.className = 'ov-url';
        urlDiv.style.cursor = 'pointer';
        urlDiv.title = 'Click to copy URL';
        urlDiv.textContent = r.url;
        urlDiv.onclick = () => { copyToClipboard(r.url); };
        body.appendChild(urlDiv);

        // Badges row 1: method + status + duration
        const badges = document.createElement('div');
        badges.className = 'ov-badges';
        badges.innerHTML = `
            <span class="badge-method ${methodBadgeClass(r.method)}">${r.method}</span>
            <span class="badge-status ${statusBadgeClass(r.statusCode)}">${r.statusCode}</span>
            ${r.durationMs ? `<span class="badge-duration">${r.durationMs}ms</span>` : ''}
            ${!isEmpty(r.timestamp) ? `<span class="badge-meta">${r.timestamp}</span>` : ''}
        `;
        body.appendChild(badges);

        // Meta row: machine, project, origin, account, session, proxy
        const metaParts = [];
        if (!isEmpty(r.machine)) metaParts.push(`<span class="badge-meta">${escapeHtml(r.machine)}</span>`);
        if (!isEmpty(r.project)) metaParts.push(`<span class="badge-meta">${escapeHtml(r.project)}</span>`);
        if (!isEmpty(r.origin))  metaParts.push(`<span class="badge-origin">${escapeHtml(r.origin)}</span>`);
        if (!isEmpty(r.account)) metaParts.push(`<span class="badge-meta">acc:${escapeHtml(r.account)}</span>`);
        if (!isEmpty(r.session)) metaParts.push(`<span class="badge-meta">sess:${escapeHtml(r.session)}</span>`);
        const proxy = !isEmpty(r.proxy) ? r.proxy : (!isEmpty(r.request?.proxy) ? r.request.proxy : null);
        if (!isEmpty(proxy))     metaParts.push(`<span class="badge-meta">proxy:${escapeHtml(proxy)}</span>`);

        if (metaParts.length > 0) {
            const meta = document.createElement('div');
            meta.className = 'ov-meta';
            meta.innerHTML = metaParts.join('');
            body.appendChild(meta);
        }

        // Action buttons - row 1: PLAY, API SKELETON, API EXAMPLE
        const row1 = document.createElement('div');
        row1.className = 'action-row';
        row1.innerHTML = `
            <button class="act-btn play"   onclick="openPlayModal()">&#9654; Play</button>
            <button class="act-btn api-sk" onclick="copyApiStructureBtn(this,'skeleton')">&#x2398; API Skeleton</button>
            <button class="act-btn api-ex" onclick="copyApiStructureBtn(this,'last')">&#x2398; API Example</button>
        `;

        // Action buttons - row 2: copy code buttons
        const row2 = document.createElement('div');
        row2.className = 'action-row';
        row2.innerHTML = `
            <button class="act-btn httpcl" onclick="copyCodeHttpClientBtn(this)">&#x2398; HttpClient</button>
            <button class="act-btn zp7"    onclick="copyCodeZP7Btn(this)">&#x2398; ZP7</button>
            <button class="act-btn hybrid" onclick="copyCodeHybridBtn(this)">&#x2398; Hybrid</button>
            <button class="act-btn python" onclick="copyCodePythonBtn(this)">&#x2398; Python</button>
            <button class="act-btn ts"     onclick="copyCodeTSBtn(this)">&#x2398; TypeScript</button>
            <button class="act-btn curl"   onclick="copyCodeCurlBtn(this)">&#x2398; cURL</button>
        `;

        const actionRows = document.createElement('div');
        actionRows.className = 'action-rows';
        actionRows.appendChild(row1);
        actionRows.appendChild(row2);
        body.appendChild(actionRows);

        // REQUEST SECTION
        body.appendChild(buildRequestSection(r));

        // RESPONSE SECTION
        body.appendChild(buildResponseSection(r));
    }

    function buildRequestSection(r) {
        const req = r.request || {};
        const headerLines = parseHeaderLines(req.headers);
        let cookies = req.cookies || req.Cookies || '';
        if (!cookies) {
            const cl = headerLines.find(h => h.toLowerCase().startsWith('cookie:'));
            if (cl) cookies = cl.substring(cl.indexOf(':') + 1).trim();
        }
        const nonCookieHeaders = headerLines.filter(h => !h.toLowerCase().startsWith('cookie:'));
        const body = req.body || '';

        const section = document.createElement('div');
        section.className = 'detail-section';

        // Section header
        const toggle = document.createElement('div');
        toggle.className = 'section-toggle open';
        toggle.innerHTML = '<span class="section-arrow">&#9654;</span> Request';
        toggle.onclick = () => toggleSection(toggle);
        section.appendChild(toggle);

        const sBody = document.createElement('div');
        sBody.className = 'section-body open';

        // -- Headers subsection (collapsed by default)
        const hdrToggle = document.createElement('div');
        hdrToggle.className = 'subsection-toggle';
        hdrToggle.innerHTML = `<span class="subsection-arrow">&#9654;</span> Headers (${nonCookieHeaders.length})`;
        hdrToggle.onclick = () => toggleSection(hdrToggle);

        const hdrBody = document.createElement('div');
        hdrBody.className = 'subsection-body';

        if (nonCookieHeaders.length > 0) {
            const list = document.createElement('div');
            list.className = 'header-list';
            nonCookieHeaders.forEach(h => {
                const ci = h.indexOf(':');
                if (ci === -1) return;
                const key = h.substring(0, ci).trim();
                const val = h.substring(ci + 1).trim();
                const item = document.createElement('div');
                item.className = 'header-item';
                item.title = 'Click key to copy "Key: Value", click value to copy value';
                item.innerHTML = `<span class="header-key">${escapeHtml(key)}</span><span class="header-value">${escapeHtml(val)}</span>`;
                item.querySelector('.header-key').onclick = (e) => { e.stopPropagation(); copyToClipboard(`${key}: ${val}`); };
                item.querySelector('.header-value').onclick = (e) => { e.stopPropagation(); copyToClipboard(val); };
                list.appendChild(item);
            });
            hdrBody.appendChild(list);
        } else {
            hdrBody.innerHTML = '<div class="empty-note">No headers</div>';
        }

        // -- Cookies subsection (collapsed by default, only if present)
        sBody.appendChild(hdrToggle);
        sBody.appendChild(hdrBody);

        if (cookies) {
            const ckToggle = document.createElement('div');
            ckToggle.className = 'subsection-toggle';
            ckToggle.innerHTML = '<span class="subsection-arrow">&#9654;</span> Cookie';
            ckToggle.onclick = () => toggleSection(ckToggle);

            const ckBody = document.createElement('div');
            ckBody.className = 'subsection-body';
            const ckBlock = document.createElement('div');
            ckBlock.className = 'cookies-block';
            ckBlock.title = 'Click to copy cookies';
            ckBlock.textContent = cookies;
            ckBlock.onclick = () => copyToClipboard(cookies);
            ckBody.appendChild(ckBlock);

            sBody.appendChild(ckToggle);
            sBody.appendChild(ckBody);
        }

        // -- Body subsection (open by default)
        const bdToggle = document.createElement('div');
        bdToggle.className = 'subsection-toggle open';
        bdToggle.innerHTML = '<span class="subsection-arrow">&#9654;</span> Body';
        bdToggle.onclick = () => toggleSection(bdToggle);

        const bdBody = document.createElement('div');
        bdBody.className = 'subsection-body open';

        if (body) {
            const bdBlock = document.createElement('div');
            bdBlock.className = 'body-block';
            bdBlock.title = 'Click to copy body';
            bdBlock.textContent = prettyJson(body);
            bdBlock.onclick = () => copyToClipboard(body);
            bdBody.appendChild(bdBlock);
        } else {
            bdBody.innerHTML = '<div class="empty-note">Empty body</div>';
        }

        sBody.appendChild(bdToggle);
        sBody.appendChild(bdBody);

        section.appendChild(sBody);
        return section;
    }

    function buildResponseSection(r) {
        const res = r.response || {};
        const headerLines = parseHeaderLines(res.headers);
        const body = res.body || '';

        const section = document.createElement('div');
        section.className = 'detail-section';

        const toggle = document.createElement('div');
        toggle.className = 'section-toggle open';
        toggle.innerHTML = '<span class="section-arrow">&#9654;</span> Response';
        toggle.onclick = () => toggleSection(toggle);
        section.appendChild(toggle);

        const sBody = document.createElement('div');
        sBody.className = 'section-body open';

        // Headers (collapsed)
        const hdrToggle = document.createElement('div');
        hdrToggle.className = 'subsection-toggle';
        hdrToggle.innerHTML = `<span class="subsection-arrow">&#9654;</span> Headers (${headerLines.length})`;
        hdrToggle.onclick = () => toggleSection(hdrToggle);

        const hdrBody = document.createElement('div');
        hdrBody.className = 'subsection-body';

        if (headerLines.length > 0) {
            const list = document.createElement('div');
            list.className = 'header-list';
            headerLines.forEach(h => {
                const ci = h.indexOf(':');
                if (ci === -1) return;
                const key = h.substring(0, ci).trim();
                const val = h.substring(ci + 1).trim();
                const item = document.createElement('div');
                item.className = 'header-item';
                item.innerHTML = `<span class="header-key">${escapeHtml(key)}</span><span class="header-value">${escapeHtml(val)}</span>`;
                item.querySelector('.header-key').onclick = (e) => { e.stopPropagation(); copyToClipboard(`${key}: ${val}`); };
                item.querySelector('.header-value').onclick = (e) => { e.stopPropagation(); copyToClipboard(val); };
                list.appendChild(item);
            });
            hdrBody.appendChild(list);
        } else {
            hdrBody.innerHTML = '<div class="empty-note">No headers</div>';
        }

        sBody.appendChild(hdrToggle);
        sBody.appendChild(hdrBody);

        // Body (open)
        const bdToggle = document.createElement('div');
        bdToggle.className = 'subsection-toggle open';
        bdToggle.innerHTML = '<span class="subsection-arrow">&#9654;</span> Body';
        bdToggle.onclick = () => toggleSection(bdToggle);

        const bdBody = document.createElement('div');
        bdBody.className = 'subsection-body open';

        if (body) {
            const bdBlock = document.createElement('div');
            bdBlock.className = 'body-block';
            bdBlock.title = 'Click to copy body';
            bdBlock.textContent = prettyJson(body);
            bdBlock.onclick = () => copyToClipboard(body);
            bdBody.appendChild(bdBlock);
        } else {
            bdBody.innerHTML = '<div class="empty-note">Empty body</div>';
        }

        sBody.appendChild(bdToggle);
        sBody.appendChild(bdBody);

        section.appendChild(sBody);
        return section;
    }

    // ── BUTTON HANDLERS ──
    function copyCodeWithFeedback(btn, text) {
        navigator.clipboard.writeText(text).then(() => {
            const orig = btn.textContent;
            btn.textContent = '\u2713 Copied!';
            setTimeout(() => { btn.textContent = orig; }, 1800);
        });
    }

    function copyApiStructureBtn(btn, mode) {
        copyCodeWithFeedback(btn, buildApiStructure(mode));
    }
    function copyCodeHttpClientBtn(btn) { copyCodeWithFeedback(btn, buildCSharpCode(selectedRequest)); }
    function copyCodeZP7Btn(btn)        { copyCodeWithFeedback(btn, buildZP7Code(selectedRequest)); }
    function copyCodeHybridBtn(btn)     { copyCodeWithFeedback(btn, buildHybridCode(selectedRequest)); }
    function copyCodePythonBtn(btn)     { copyCodeWithFeedback(btn, buildPythonCode(selectedRequest)); }
    function copyCodeTSBtn(btn)         { copyCodeWithFeedback(btn, buildTSCode(selectedRequest)); }
    function copyCodeCurlBtn(btn)       { copyCodeWithFeedback(btn, buildCurlCode(selectedRequest)); }

    // ── STATS ──
    async function updateStats() {
        try {
            const response = await fetch(`${SERVER}/traffic-stats`);
            const stats = await response.json();

            document.getElementById('totalRequests').textContent = stats.totalRequests;

            const success = stats.byStatus['2xx'] || 0;
            const successRate = stats.totalRequests > 0 ? Math.round((success / stats.totalRequests) * 100) : 0;
            document.getElementById('successRate').textContent = successRate + '%';
            document.getElementById('avgTime').textContent = stats.avgDurationMs + 'ms';

            const machineFilter = document.getElementById('machineFilter');
            const projectFilter = document.getElementById('projectFilter');
            const curMachine = machineFilter.value;
            const curProject = projectFilter.value;

            if (stats.byMachine) {
                machineFilter.innerHTML = '<option value="">All Machines</option>' +
                    Object.keys(stats.byMachine).map(m =>
                        `<option value="${m}" ${m === curMachine ? 'selected' : ''}>${m}</option>`
                    ).join('');
            }

            if (stats.byProject) {
                projectFilter.innerHTML = '<option value="">All Projects</option>' +
                    Object.keys(stats.byProject).map(p =>
                        `<option value="${p}" ${p === curProject ? 'selected' : ''}>${p}</option>`
                    ).join('');
            }
        } catch (e) {
            console.error('Stats update failed:', e);
        }
    }

    function toggleAutoRefresh() {
        autoRefresh = !autoRefresh;
        document.getElementById('autoStatus').textContent = autoRefresh ? 'ON' : 'OFF';
        if (autoRefresh) startSse(); else stopSse();
        PageState.save({ autoRefresh: autoRefresh });
    }

    function startSse() {
        if (_sse) return;
        _sse = new EventSource(`${SERVER}/traffic-logs/stream`);
        _sse.onmessage = e => {
            try {
                const log = JSON.parse(e.data);
                currentLogs.unshift(log);
                const limit = parseInt(document.getElementById('limitInput').value) || 200;
                if (currentLogs.length > limit * 2) currentLogs = currentLogs.slice(0, limit * 2);
                applyFiltersAndRender();
                updateStats();
            } catch {}
        };
        _sse.onerror = () => { stopSse(); setTimeout(() => { if (autoRefresh) startSse(); }, 3000); };
    }

    function stopSse() {
        if (_sse) { _sse.close(); _sse = null; }
    }

    function applyFiltersAndRender() {
        const method  = document.getElementById('methodFilter').value;
        const status  = document.getElementById('statusFilter').value;
        const url     = document.getElementById('urlFilter').value;
        const machine = document.getElementById('machineFilter').value;
        const project = document.getElementById('projectFilter').value;
        const limit   = parseInt(document.getElementById('limitInput').value) || 200;

        let logs = currentLogs;
        if (method)  logs = logs.filter(l => l.method === method);
        if (status)  logs = logs.filter(l => String(l.statusCode || '').startsWith(status));
        if (url)     logs = logs.filter(l => (l.url || '').toLowerCase().includes(url.toLowerCase()));
        if (machine) logs = logs.filter(l => (l.machine || '') === machine);
        if (project) logs = logs.filter(l => (l.project || '') === project);

        renderRequests(logs.slice(0, limit));
    }

    function clearFilters() {
        document.getElementById('methodFilter').value = '';
        document.getElementById('statusFilter').value = '';
        document.getElementById('urlFilter').value = '';
        document.getElementById('machineFilter').value = '';
        document.getElementById('projectFilter').value = '';
        PageState.save({ methodFilter: '', statusFilter: '', urlFilter: '', machineFilter: '', projectFilter: '' });
        refresh();
    }

    async function clearLogs() {
        if (!await Dialog.confirm('Delete all HTTP logs?')) return;
        try {
            await fetch(`${SERVER}/clear-http`, { method: 'POST' });
            refresh();
        } catch (e) {
            console.error('Clear failed:', e);
        }
    }

    // ── PLAY MODAL ──
    function openPlayModal() {
        if (!selectedRequest) return;

        stopSse();
        if (refreshAbortController) {
            refreshAbortController.abort();
            refreshAbortController = null;
        }

        const r = selectedRequest.request;
        const headerLines = parseHeaderLines(r.headers);
        const replayHeaders = headerLines.filter(h => !h.startsWith(':')).join('\n');
        const body = r.body || '';

        const methodEl = document.getElementById('playMethod');
        ['GET','POST','PUT','DELETE','PATCH','HEAD'].forEach((m, i) => {
            methodEl.options[i].selected = (selectedRequest.method === m);
        });
        document.getElementById('playUrl').value = selectedRequest.url;
        document.getElementById('playHeaders').value = replayHeaders;
        document.getElementById('playBody').value = prettyJson(body);
        document.getElementById('playResponse').value = '';
        document.getElementById('playStatus').textContent = '';
        document.getElementById('playStatus').className = 'play-status';

        document.getElementById('playModalOverlay').classList.add('show');
    }

    function closePlayModal() {
        document.getElementById('playModalOverlay').classList.remove('show');
        if (playAbortController) {
            playAbortController.abort();
            playAbortController = null;
        }
        if (autoRefresh) startSse();
    }

    function closePlayModalOnBg(e) {
        if (e.target === document.getElementById('playModalOverlay')) closePlayModal();
    }

    function copyCurlBtn2(btn) {
        if (!selectedRequest) return;
        const method = document.getElementById('playMethod')?.value || selectedRequest.method;
        const url    = document.getElementById('playUrl')?.value    || selectedRequest.url;
        const hText  = document.getElementById('playHeaders')?.value || '';
        const body   = document.getElementById('playBody')?.value   || '';
        let curl = `curl -X ${method} '${url}'`;
        hText.split('\n').forEach(h => {
            if (h.trim() && !h.includes('***MASKED***')) curl += ` \\\n  -H '${h.trim().replace(/'/g, "\\'")}'`;
        });
        if (body.trim()) curl += ` \\\n  -d '${body.replace(/'/g, "\\'")}'`;
        copyCodeWithFeedback(btn, curl);
    }

    async function sendPlay() {
        const url      = document.getElementById('playUrl').value.trim();
        const method   = document.getElementById('playMethod').value;
        const hText    = document.getElementById('playHeaders').value;
        const body     = document.getElementById('playBody').value.trim();
        const statusEl = document.getElementById('playStatus');
        const respEl   = document.getElementById('playResponse');

        if (!url) { respEl.value = 'URL is empty'; return; }

        statusEl.className   = 'play-status';
        statusEl.textContent = 'Sending...';
        respEl.value = '';

        stopSse();

        playAbortController = new AbortController();

        const headers = parseHeadersTextToObj(hText);
        delete headers['accept-encoding'];
        delete headers['Accept-Encoding'];

        let res;
        try {
            res = await fetch(`${REPLAY_SERVER}/http-replay`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url, method, headers, body: body || null }),
                signal: playAbortController.signal
            });
        } catch (e) {
            if (e.name === 'AbortError') return;
            if (autoRefresh) startSse();
            statusEl.className   = 'play-status err';
            statusEl.textContent = 'Unreachable';
            respEl.value = 'Cannot connect to ' + SERVER + '\n\nError: ' + e.message;
            return;
        }

        if (autoRefresh) startSse();

        let rawText = '';
        try { rawText = await res.text(); } catch {}
        let json = null;
        try { json = JSON.parse(rawText); } catch {}

        if (!json || json.error) {
            statusEl.className   = 'play-status err';
            statusEl.textContent = json?.error ? json.error : ('HTTP ' + res.status);
            respEl.value = json?.error || ('HTTP ' + res.status + '\n\n' + rawText);
            return;
        }

        const status = json.statusCode || res.status;
        const cls = status >= 200 && status < 300 ? 'status-2xx'
            : status >= 300 && status < 400 ? 'status-3xx'
                : status >= 400 && status < 500 ? 'status-4xx' : 'status-5xx';
        statusEl.className = 'play-status ok';
        statusEl.innerHTML = `<span class="${cls}">${status}</span> &middot; ${json.durationMs ?? '?'}ms`;

        let respBody = json.responseBody || '';
        try { respBody = JSON.stringify(JSON.parse(respBody), null, 2); } catch {}
        const respHeaders = Object.entries(json.responseHeaders || {}).map(([k,v]) => `${k}: ${v}`).join('\n');
        respEl.value = `-- Headers --\n${respHeaders}\n\n-- Body --\n${respBody}`;
    }

    // ── CODE BUILDERS ──

    function parseHeaderLines(raw) {
        if (!raw) return [];
        if (Array.isArray(raw)) return raw.filter(h => h && h.trim());
        if (typeof raw === 'string') return raw.split('\r\n').filter(h => h.trim());
        return [];
    }

    function prettyJson(str) {
        try { return JSON.stringify(JSON.parse(str), null, 2); } catch(e) { return str; }
    }

    function parseHeadersTextToObj(text) {
        const h = {};
        if (!text.trim()) return h;
        text.split('\n').forEach(line => {
            const idx = line.indexOf(':');
            if (idx > 0) { h[line.slice(0, idx).trim()] = line.slice(idx + 1).trim(); }
        });
        return h;
    }

    function buildCSharpCode(req) {
        const method  = req.method;
        const url     = req.url;
        const headerLines = parseHeaderLines(req.request.headers)
            .filter(h => !h.startsWith(':') && !h.includes('***MASKED***'));
        const body = req.request.body || '';

        let contentType = 'application/json';
        let cookieHeader = '';
        const requestHeaders = [];

        headerLines.forEach(h => {
            const ci = h.indexOf(':');
            if (ci === -1) return;
            const key = h.substring(0, ci).trim();
            const val = h.substring(ci + 1).trim();
            const kl  = key.toLowerCase();
            if (kl === 'content-type') { contentType = val; return; }
            if (kl === 'cookie')       { cookieHeader = val; return; }
            requestHeaders.push([key, val]);
        });

        const esc = s => { let r = ''; for (let i = 0; i < s.length; i++) { const ch = s[i]; r += ch === '"' ? '\\"' : ch === '\\' ? '\\\\' : ch; } return r; };

        const lines = [];
        lines.push('using System.Net;');
        lines.push('using System.Net.Http;');
        lines.push('using System.Text;');
        lines.push('');
        lines.push('var handler = new HttpClientHandler');
        lines.push('{');
        lines.push('    AutomaticDecompression = DecompressionMethods.GZip | DecompressionMethods.Deflate | DecompressionMethods.Brotli,');
        lines.push('    UseCookies = false');
        lines.push('};');
        lines.push('');
        lines.push('using var client = new HttpClient(handler);');
        lines.push('');
        const methodPascal = method.charAt(0).toUpperCase() + method.slice(1).toLowerCase();
        lines.push(`var request = new HttpRequestMessage(HttpMethod.${methodPascal}, "${esc(url)}");`);
        lines.push('');

        if (requestHeaders.length > 0) {
            lines.push('// Request headers');
            requestHeaders.forEach(([k, v]) => {
                lines.push(`request.Headers.TryAddWithoutValidation("${k}", "${esc(v)}");`);
            });
            lines.push('');
        }

        if (cookieHeader) {
            lines.push('// Cookies');
            lines.push(`request.Headers.TryAddWithoutValidation("Cookie", "${esc(cookieHeader)}");`);
            lines.push('');
        }

        if (body && method !== 'GET' && method !== 'HEAD') {
            const bodyEsc = esc(body).replace(/\n/g, '\\n').replace(/\r/g, '');
            lines.push('// Body');
            lines.push(`request.Content = new StringContent("${bodyEsc}", Encoding.UTF8, "${contentType}");`);
            lines.push('');
        }

        lines.push('var response = await client.SendAsync(request);');
        lines.push('var responseBody = await response.Content.ReadAsStringAsync();');
        lines.push('');
        lines.push('Console.WriteLine($"Status: {(int)response.StatusCode}");');
        lines.push('Console.WriteLine(responseBody);');

        return lines.join('\n');
    }

    function buildZP7Code(req) {
        const method  = req.method;
        const url     = req.url;
        const headerLines = parseHeaderLines(req.request.headers)
            .filter(h => !h.startsWith(':') && !h.includes('***MASKED***'));
        const body = req.request.body || '';

        let contentType = 'application/x-www-form-urlencoded';
        let cookieHeader = '';
        let userAgent = '';
        const additionalHeaders = [];

        headerLines.forEach(h => {
            const ci = h.indexOf(':');
            if (ci === -1) return;
            const key = h.substring(0, ci).trim();
            const val = h.substring(ci + 1).trim();
            const kl  = key.toLowerCase();
            if (kl === 'content-type') { contentType = val; return; }
            if (kl === 'cookie')       { cookieHeader = val; return; }
            if (kl === 'user-agent')   { userAgent = val; return; }
            additionalHeaders.push(`${key}: ${val}`);
        });

        const vEsc = s => String(s).split('"').join('""');
        const zpMethod = `ZennoLab.InterfacesLibrary.Enums.Http.HttpMethod.${method}`;

        const lines = [];
        lines.push('var response = ZennoPoster.HTTP.Request(');
        lines.push(`    ${zpMethod},`);
        lines.push(`    @"${vEsc(url)}",`);
        lines.push(`    content: @"${vEsc(body)}",`);
        lines.push(`    contentPostingType: @"${vEsc(contentType)}",`);
        lines.push(`    proxy: "",`);
        lines.push(`    Encoding: "UTF-8",`);
        lines.push(`    respType: ZennoLab.InterfacesLibrary.Enums.Http.ResponceType.HeaderAndBody,`);
        lines.push(`    Timeout: 30000,`);
        lines.push(`    Cookies: @"${vEsc(cookieHeader)}",`);
        lines.push(`    UserAgent: @"${vEsc(userAgent)}",`);
        lines.push(`    UseRedirect: true,`);
        lines.push(`    MaxRedirectCount: 5,`);
        if (additionalHeaders.length > 0) {
            const hdrs = additionalHeaders.map(h => `@"${vEsc(h)}"`).join(', ');
            lines.push(`    AdditionalHeaders: new string[] { ${hdrs} },`);
        } else {
            lines.push(`    AdditionalHeaders: null,`);
        }
        lines.push(`    DownloadPath: null,`);
        lines.push(`    UseOriginalUrl: false,`);
        lines.push(`    throwExceptionOnError: true,`);
        lines.push(`    cookieContainer: null,`);
        lines.push(`    removeDefaultHeaders: true`);
        lines.push(');');
        return lines.join('\n');
    }

    function buildHybridCode(req) {

        const methodPascal = method.charAt(0).toUpperCase() + method.slice(1).toLowerCase();

        if (cookieHeader) {

    function buildPythonCode(req) {
        const method  = req.method;
        const url     = req.url;
        const headerLines = parseHeaderLines(req.request.headers)
            .filter(h => !h.startsWith(':') && !h.includes('***MASKED***'));
        const body = req.request.body || '';

        let contentType = '';
        let cookieHeader = '';
        const headersObj = {};

        headerLines.forEach(h => {
            const ci = h.indexOf(':');
            if (ci === -1) return;
            const key = h.substring(0, ci).trim();
            const val = h.substring(ci + 1).trim();
            const kl  = key.toLowerCase();
            if (kl === 'cookie') { cookieHeader = val; return; }
            if (kl === 'content-type') contentType = val;
            headersObj[key] = val;
        });

        const pyEsc = s => String(s).split('\\').join('\\\\').split("'").join("\\'");
        const pyStr = s => "'" + pyEsc(s) + "'";
        const pyDict = obj => {
            const entries = Object.entries(obj);
            if (!entries.length) return '{}';
            return '{\n' + entries.map(([k, v]) => '    ' + pyStr(k) + ': ' + pyStr(v)).join(',\n') + '\n}';
        };

        const lines = [];
        lines.push('import requests');
        lines.push('');
        lines.push('headers = ' + pyDict(headersObj));
        lines.push('');

        if (cookieHeader) {
            const cookieDict = {};
            cookieHeader.split(';').forEach(pair => {
                const eq = pair.indexOf('=');
                if (eq > 0) cookieDict[pair.slice(0, eq).trim()] = pair.slice(eq + 1).trim();
            });
            lines.push('cookies = ' + pyDict(cookieDict));
            lines.push('');
        }

        const meth = method.toLowerCase();
        const cookiesArg = cookieHeader ? ', cookies=cookies' : '';

        if (body && method !== 'GET' && method !== 'HEAD') {
            if (contentType.includes('json')) {
                lines.push('import json');
                lines.push('');
                lines.push('payload = json.loads(' + pyStr(body) + ')');
                lines.push('');
                lines.push('response = requests.' + meth + '(' + pyStr(url) + ', headers=headers, json=payload' + cookiesArg + ')');
            } else {
                lines.push('payload = ' + pyStr(body));
                lines.push('');
                lines.push('response = requests.' + meth + '(' + pyStr(url) + ', headers=headers, data=payload' + cookiesArg + ')');
            }
        } else {
            lines.push('response = requests.' + meth + '(' + pyStr(url) + ', headers=headers' + cookiesArg + ')');
        }

        lines.push('');
        lines.push('print(response.status_code)');
        lines.push('print(response.text)');
        return lines.join('\n');
    }

    function buildTSCode(req) {
        const method  = req.method;
        const url     = req.url;
        const headerLines = parseHeaderLines(req.request.headers)
            .filter(h => !h.startsWith(':') && !h.includes('***MASKED***'));
        const body = req.request.body || '';

        let contentType = 'application/json';
        let cookieHeader = '';
        const headersObj = {};

        headerLines.forEach(h => {
            const ci = h.indexOf(':');
            if (ci === -1) return;
            const key = h.substring(0, ci).trim();
            const val = h.substring(ci + 1).trim();
            const kl  = key.toLowerCase();
            if (kl === 'cookie') { cookieHeader = val; }
            if (kl === 'content-type') contentType = val;
            headersObj[key] = val;
        });
        if (cookieHeader) headersObj['Cookie'] = cookieHeader;

        const escDQ = s => { let r = ''; for (let i = 0; i < s.length; i++) { const ch = s[i]; r += ch === '"' ? '\\"' : ch === '\\' ? '\\\\' : ch === '\n' ? '\\n' : ch === '\r' ? '' : ch; } return r; };

        const headersLines = Object.entries(headersObj)
            .map(([k, v]) => '    "' + escDQ(k) + '": "' + escDQ(v) + '"')
            .join(',\n');

        const lines = [];
        lines.push('const response = await fetch(');
        lines.push('  "' + escDQ(url) + '",');
        lines.push('  {');
        lines.push('    method: "' + method + '",');
        lines.push('    headers: {');
        if (headersLines) lines.push(headersLines);
        lines.push('    },');
        if (body && method !== 'GET' && method !== 'HEAD') {
            lines.push('    body: "' + escDQ(body) + '",');
        }
        lines.push('  }');
        lines.push(');');
        lines.push('');
        lines.push('const data = await response.text();');
        lines.push('console.log(response.status, data);');
        return lines.join('\n');
    }

    function buildCurlCode(req) {
        const headerLines = parseHeaderLines(req.request.headers)
            .filter(h => !h.startsWith(':') && !h.includes('***MASKED***'));
        const body = req.request.body || '';
        const sqEsc = s => s.split("'").join("'\\''");

        let curl = 'curl -X ' + req.method + " \\\n  '" + sqEsc(req.url) + "'";
        headerLines.forEach(h => {
            if (!h.includes('***MASKED***'))
                curl += " \\\n  -H '" + sqEsc(h) + "'";
        });
        if (body && req.method !== 'GET' && req.method !== 'HEAD')
            curl += " \\\n  --data-raw '" + sqEsc(body) + "'";
        return curl;
    }

    // ── API STRUCTURE ──
    function bodyToSkeleton(val) {
        if (val === null || val === undefined) return null;
        if (Array.isArray(val)) return val.length > 0 ? [bodyToSkeleton(val[0])] : [];
        if (typeof val === 'object') {
            const out = {};
            for (const k of Object.keys(val)) out[k] = bodyToSkeleton(val[k]);
            return out;
        }
        return typeof val;
    }

    function skeletonKey(skeleton) {
        try { return JSON.stringify(skeleton); } catch(e) { return String(skeleton); }
    }

    function tryParseJson(s) {
        if (!s) return null;
        try { return JSON.parse(s); } catch(e) { return null; }
    }

    function buildApiStructure(mode) {
        mode = mode || 'skeleton';
        const logs = currentLogs;
        if (!logs || !logs.length) return '[]';

        const endpointMap = {};

        logs.forEach(log => {
            const urlPath = (log.url || '').split('?')[0];
            const lastSeg = urlPath.substring(urlPath.lastIndexOf('/') + 1);
            if (!urlPath.endsWith('/') && lastSeg.includes('.')) return;

            const method = log.method || '';
            const url    = log.url || '';
            const key    = method + ':' + url;

            const reqBody  = (log.request  && log.request.body)  || '';
            const respBody = (log.response && log.response.body) || '';
            const reqHdrs  = parseHeaderLines((log.request  && log.request.headers)  || '');
            const respHdrs = parseHeaderLines((log.response && log.response.headers) || '');

            const cookieLine     = reqHdrs.find(h => h.toLowerCase().startsWith('cookie:'));
            const reqCookies     = cookieLine ? cookieLine.substring(cookieLine.indexOf(':') + 1).trim() : '';
            const setCookieLines = respHdrs.filter(h => h.toLowerCase().startsWith('set-cookie:'));
            const respCookies    = setCookieLines.map(h => h.substring(h.indexOf(':') + 1).trim()).join('\n');

            const reqHeaderObj = {}, respHeaderObj = {};
            reqHdrs.forEach(h => {
                if (h.startsWith(':')) return;
                const ci = h.indexOf(':'); if (ci < 0) return;
                const k = h.substring(0, ci).trim().toLowerCase();
                if (k === 'cookie') return;
                reqHeaderObj[k] = h.substring(ci + 1).trim();
            });
            respHdrs.forEach(h => {
                const ci = h.indexOf(':'); if (ci < 0) return;
                const k = h.substring(0, ci).trim().toLowerCase();
                if (k === 'set-cookie') return;
                respHeaderObj[k] = h.substring(ci + 1).trim();
            });

            const reqParsed   = tryParseJson(reqBody);
            const reqSkeleton = reqParsed !== null ? bodyToSkeleton(reqParsed) : (reqBody ? 'string' : null);
            const skelKey     = skeletonKey(reqSkeleton);

            if (!endpointMap[key]) {
                endpointMap[key] = {
                    method, url,
                    statusCode: log.statusCode,
                    requestHeaders:  reqHeaderObj,
                    responseHeaders: respHeaderObj,
                    requestCookies:  reqCookies,
                    responseCookies: respCookies,
                    requestBodies: {},
                    firstRespRaw: null, lastRespRaw: null,
                    firstRespParsed: null, lastRespParsed: null
                };
            }

            const ep = endpointMap[key];

            if (reqSkeleton !== null) {
                if (!ep.requestBodies[skelKey]) {
                    ep.requestBodies[skelKey] = {
                        skeleton: reqSkeleton,
                        firstRaw: reqParsed !== null ? reqParsed : reqBody,
                        lastRaw:  reqParsed !== null ? reqParsed : reqBody
                    };
                } else {
                    ep.requestBodies[skelKey].lastRaw = reqParsed !== null ? reqParsed : reqBody;
                }
            }

            if (respBody) {
                const rp = tryParseJson(respBody);
                if (!ep.firstRespRaw) {
                    ep.firstRespRaw    = rp !== null ? rp : respBody;
                    ep.firstRespParsed = rp !== null ? bodyToSkeleton(rp) : 'string';
                }
                ep.lastRespRaw    = rp !== null ? rp : respBody;
                ep.lastRespParsed = rp !== null ? bodyToSkeleton(rp) : 'string';
            }
        });

        const result = Object.values(endpointMap).map(ep => {
            const bodyEntries = Object.values(ep.requestBodies);

            let reqBody;
            if (bodyEntries.length === 0) {
                reqBody = null;
            } else {
                const pick = entries => entries.map(e => {
                    if (mode === 'skeleton') return e.skeleton;
                    if (mode === 'first')    return e.firstRaw;
                    if (mode === 'last')     return e.lastRaw;
                });
                const picked = pick(bodyEntries);
                reqBody = picked.length === 1 ? picked[0] : picked;
            }

            let respBody;
            if (mode === 'skeleton') respBody = ep.firstRespParsed;
            else if (mode === 'first') respBody = ep.firstRespRaw;
            else if (mode === 'last')  respBody = ep.lastRespRaw;

            return {
                method:          ep.method,
                url:             ep.url,
                statusCode:      ep.statusCode,
                requestHeaders:  ep.requestHeaders,
                responseHeaders: ep.responseHeaders,
                requestCookies:  ep.requestCookies  || null,
                responseCookies: ep.responseCookies || null,
                requestBody:     reqBody,
                responseBody:    respBody || null
            };
        });

        return JSON.stringify(result, null, 2);
    }

    // ── UTILS ──
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function truncate(str, len) {
        if (str.length <= len) return str;
        return str.substring(0, len) + '...';
    }

    // Restore controls from saved state before first refresh
    (function restoreState() {
        const st = PageState.load();
        if (st.methodFilter  != null) document.getElementById('methodFilter').value  = st.methodFilter;
        if (st.statusFilter  != null) document.getElementById('statusFilter').value  = st.statusFilter;
        if (st.urlFilter     != null) document.getElementById('urlFilter').value     = st.urlFilter;
        if (st.limitInput    != null) document.getElementById('limitInput').value    = st.limitInput;
        if (st.autoRefresh   === false) {
            autoRefresh = false;
            document.getElementById('autoStatus').textContent = 'OFF';
        }
    })();
    refresh();
    if (autoRefresh) startSse();
</script>

<script>
    function openCurlImport() {
        document.getElementById('curlImportInput').value = '';
        document.getElementById('curlImportError').style.display = 'none';
        document.getElementById('curlImportOverlay').classList.add('show');
    }

    function closeCurlImport() {
        document.getElementById('curlImportOverlay').classList.remove('show');
    }

    function closeCurlImportOnBg(e) {
        if (e.target === document.getElementById('curlImportOverlay')) closeCurlImport();
    }

    function parseCurl(raw) {
        // normalize: join continuation lines, collapse whitespace
        const normalized = raw.replace(/\\\s*\n\s*/g, ' ').trim();

        // tokenize respecting single/double quotes
        const tokens = [];
        let i = 0;
        while (i < normalized.length) {
            if (normalized[i] === ' ') { i++; continue; }
            if (normalized[i] === "'") {
                let j = i + 1;
                while (j < normalized.length && normalized[j] !== "'") j++;
                tokens.push(normalized.slice(i + 1, j));
                i = j + 1;
            } else if (normalized[i] === '"') {
                let j = i + 1, s = '';
                while (j < normalized.length && normalized[j] !== '"') {
                    if (normalized[j] === '\\' && j + 1 < normalized.length) { s += normalized[j+1]; j += 2; }
                    else { s += normalized[j]; j++; }
                }
                tokens.push(s);
                i = j + 1;
            } else {
                let j = i;
                while (j < normalized.length && normalized[j] !== ' ') j++;
                tokens.push(normalized.slice(i, j));
                i = j;
            }
        }

        if (!tokens.length || tokens[0].toLowerCase() !== 'curl') throw new Error('Not a curl command');

        let method = 'GET';
        let url = '';
        const headers = [];
        let body = '';

        for (let t = 1; t < tokens.length; t++) {
            const tok = tokens[t];
            if (tok === '-X' || tok === '--request') {
                method = tokens[++t] || 'GET';
            } else if (tok === '-H' || tok === '--header') {
                const h = tokens[++t] || '';
                if (h) headers.push(h);
            } else if (tok === '-d' || tok === '--data' || tok === '--data-raw' || tok === '--data-binary') {
                body = tokens[++t] || '';
            } else if (tok === '--json') {
                body = tokens[++t] || '';
                if (!headers.some(h => h.toLowerCase().startsWith('content-type')))
                    headers.push('Content-Type: application/json');
            } else if (tok === '-u' || tok === '--user') {
                const creds = tokens[++t] || '';
                headers.push('Authorization: Basic ' + btoa(creds));
            } else if (tok === '--compressed') {
                // ignore
            } else if (tok === '-x' || tok === '--proxy') {
                t++; // skip, not used in output
            } else if (!tok.startsWith('-') && !url) {
                url = tok;
            }
        }

        if (!url) throw new Error('URL not found');

        // infer POST if body present and method still GET
        if (body && method === 'GET') method = 'POST';

        return {
            method,
            url,
            statusCode: 0,
            timestamp: new Date().toISOString(),
            durationMs: null,
            machine: null,
            project: null,
            request: {
                headers: headers,
                body: body || null,
                proxy: null
            },
            response: {
                headers: [],
                body: null
            }
        };
    }

    function importCurl() {
        const raw = document.getElementById('curlImportInput').value.trim();
        const errEl = document.getElementById('curlImportError');
        errEl.style.display = 'none';

        let req;
        try {
            req = parseCurl(raw);
        } catch (e) {
            errEl.textContent = e.message;
            errEl.style.display = 'block';
            return;
        }

        closeCurlImport();

        // inject as selectedRequest and show details panel
        selectedRequest = req;
        selectedIdx = null;

        document.querySelectorAll('.request-item').forEach(el => el.classList.remove('selected'));

        const panel = document.getElementById('detailsPanel');
        panel.classList.add('visible');
        renderDetails();
    }
</script>

</body>
