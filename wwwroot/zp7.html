    async function loadPmHeatmap(forceRefresh = false) {
        const content = document.getElementById('pmHeatmapContent');
        if (!content) return;

        if (!forceRefresh) {
            try {
                const cached = sessionStorage.getItem(PM_HEATMAP_CACHE_KEY);
                if (cached) {
                    const { ts, projects } = JSON.parse(cached);
                    if (Date.now() - ts < PM_HEATMAP_TTL_MS) {
                        renderPmHeatmap(projects, content);
                        return;
                    }
                }
            } catch {}
        }

        content.innerHTML = '<div class="zp7-heatmap-loading">Loading...</div>';

        try {
            const r = await fetch(`${SERVER}/report/api/projects-db`);
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            const data = await r.json();
            const projects = data.projects || {};
            try {
                sessionStorage.setItem(PM_HEATMAP_CACHE_KEY, JSON.stringify({ ts: Date.now(), projects }));
            } catch {}
            renderPmHeatmap(projects, content);
        } catch (e) {
            content.innerHTML = `<div class="zp7-heatmap-loading" style="color:var(--red)">Failed: ${e.message}</div>`;
        }
    }

    function renderPmHeatmap(projectsObj, container) {
        // Преобразуем объект в массив как в report.html
        const projects = Object.entries(projectsObj).map(([name, p]) => ({
            name,
            accounts: p.accounts || {}
        }));

        const active = projects.filter(p => Object.keys(p.accounts).length > 0);

        if (!active.length) {
            container.innerHTML = '<div class="zp7-heatmap-loading">No project data</div>';
            return;
        }

        // Сортировка по lastActivity (как в report.html по умолчанию)
        active.sort((a, b) => {
            const latest = proj => Object.values(proj.accounts)
                .map(acc => new Date(acc.timestamp || 0))
                .reduce((max, d) => d > max ? d : max, new Date(0));
            return latest(b) - latest(a);
        });

        // maxAccountIndex — максимальный числовой id по всем проектам
        let maxIdx = 0;
        active.forEach(p => {
            Object.keys(p.accounts).forEach(k => {
                const n = parseInt(k);
                if (!isNaN(n) && n > maxIdx) maxIdx = n;
            });
        });

        const today = new Date();
        today.setHours(0, 0, 0, 0);

        container.innerHTML = active.map(project => pmRenderProjectBlock(project, maxIdx, today)).join('');

        // load AI report cache and attach icon handlers
        fetch(`${SERVER}/ai-report/api/cache`)
            .then(r => r.ok ? r.json() : { entries: [] })
            .then(data => {
                const cache = {};
                (data.entries || []).forEach(e => { cache[e.project] = e; });
                container.querySelectorAll('.ai-info-icon').forEach(icon => {
                    const project = icon.dataset.project;
                    const entry   = cache[project];
                    icon.dataset.aiReport = entry ? JSON.stringify(entry) : '';
                });
                // __all__ icon is outside container
                const allIcon = document.getElementById('aiAllIcon');
                if (allIcon) {
                    const entry = cache['__all__'];
                    allIcon.dataset.aiReport = entry ? JSON.stringify(entry) : '';
                }
            })
            .catch(() => {});
    }

    function pmRenderProjectBlock(project, maxIndex, today) {
        const total   = Object.keys(project.accounts).length;
        const success = Object.values(project.accounts).filter(a => a.status === '+').length;
        const failed  = total - success;
        const rate    = total > 0 ? ((success / total) * 100).toFixed(1) : '0.0';

        // timing stats
        let totalSuccessTime = 0, totalErrorTime = 0;
        let successWithTime  = 0, errorWithTime  = 0;
        let minST = Infinity,  maxST = 0;
        let minET = Infinity,  maxET = 0;

        Object.values(project.accounts).forEach(acc => {
            const t = parseFloat(acc.completionSec);
            if (!isNaN(t) && t > 0) {
                if (acc.status === '+') {
                    totalSuccessTime += t; successWithTime++;
                    if (t < minST) minST = t; if (t > maxST) maxST = t;
                } else {
                    totalErrorTime += t; errorWithTime++;
                    if (t < minET) minET = t; if (t > maxET) maxET = t;
                }
            }
        });

        const avgST = successWithTime > 0 ? (totalSuccessTime / successWithTime).toFixed(1) : 0;
        const avgET = errorWithTime   > 0 ? (totalErrorTime   / errorWithTime  ).toFixed(1) : 0;

        const cells = [];
        for (let i = 1; i <= maxIndex; i++) {
            cells.push(pmRenderCell(project, i, today));
        }

        return `
        <div class="heatmap-with-stats">
            <div class="heatmap-project-card">
                <div class="project-card">
                    <div class="project-name" style="display:flex;align-items:center;gap:0;">
                        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(project.name)}</span>
                        <span class="ai-info-icon" data-project="${escHtml(project.name)}" data-ai-report="" title="AI report">i</span>
                    </div>
                    <div class="progress-bar">
                        <div style="display:flex;height:100%;width:100%;">
                            <div style="width:${rate}%;background:#238636;"></div>
                            <div style="width:${total>0?(failed/total*100).toFixed(1):0}%;background:#da3633;"></div>
                        </div>
                    </div>
                    <div class="project-stats">
                        <div class="stat-row"><span>[✔️/❌]:</span><span class="stat-good">${success}</span><span class="stat-bad">${failed}</span></div>
                        <div class="stat-row"><span>Rate:</span><span class="${rate>=90?'stat-good':rate>=70?'stat-neutral':'stat-bad'}">${rate}%</span></div>
                        ${successWithTime > 0 ? `<div class="stat-row"><span>Min:</span><span class="stat-neutral">${minST.toFixed(1)}s</span></div>` : ''}
                        ${successWithTime > 0 ? `<div class="stat-row"><span>Max:</span><span class="stat-neutral">${maxST.toFixed(1)}s</span></div>` : ''}
                        ${successWithTime > 0 ? `<div class="stat-row"><span>Avg:</span><span class="stat-neutral">${avgST}s</span></div>` : ''}
                    </div>
                </div>
            </div>
            <div class="heatmap-content">
                <div class="heatmap-row">
                    <div class="cells-container">${cells.join('')}</div>
                </div>
            </div>
        </div>`;
    }

    function pmRenderCell(project, accountId, today) {
        const acc = project.accounts[accountId];

        const safeAttr = s => s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

        if (!acc) {
            const tip = safeAttr(`account #${accountId}||${project.name}||—||||notdone||||daily`);
            return `<div class="heatmap-cell" data-zp7-tooltip="${tip}"></div>`;
        }

        const accDate = new Date(acc.timestamp);
        accDate.setHours(0, 0, 0, 0);
        const daysDiff = Math.floor((today.getTime() - accDate.getTime()) / 86400000);

        let ageClass = '';
        if      (daysDiff === 0) ageClass = '';
        else if (daysDiff === 1) ageClass = '-yesterday';
        else if (daysDiff === 2) ageClass = '-2days';
        else                     ageClass = '-old';

        const statusClass = acc.status === '+' ? `success${ageClass}` : `error${ageClass}`;

        // report может содержать кавычки, | и прочее — кодируем отдельно
        const report = (acc.report || '').substring(0, 200).replace(/\|/g, '!');
        const tip = safeAttr(`account #${accountId}||${project.name}||${acc.timestamp}||${acc.completionSec||''}||${acc.status==='+'?'success':'error'}||${report}||daily`);

        return `<div class="heatmap-cell ${statusClass}" data-zp7-tooltip="${tip}"></div>`;
    }

    // Тултипы вешаются один раз на document через делегирование
    (function pmInitTooltips() {
        const tip = () => document.getElementById('pmTooltip');

        function positionTip(e, el) {
            const t = tip(); if (!t) return;
            const parts = el.getAttribute('data-zp7-tooltip').split('||');
            const [accLabel, projName, timestamp, completionSec, status, report] = parts;

            let html = `<div class="zp7-tooltip-title">${accLabel}</div>`;
            html += `<div style="color:var(--text2);font-size:11px;margin-bottom:5px;">${projName}</div>`;
            if (timestamp && timestamp !== '—') {
                html += `<div class="zp7-tooltip-time">⏱ ${timestamp}${completionSec ? ` (${completionSec}s)` : ''}</div>`;
            }
            if (status === 'success')    html += `<div class="zp7-tooltip-ok">✓ Success</div>`;
            else if (status === 'error') html += `<div class="zp7-tooltip-err">✗ Failed</div>`;
            else                         html += `<div style="color:var(--muted);font-size:11px;">Not touched</div>`;
            if (report && report.trim()) html += `<div class="zp7-tooltip-report ${status === 'success' ? 'zp7-tooltip-report-ok' : ''}">${report.substring(0, 200)}</div>`;

            t.innerHTML = html;
            t.classList.add('show');

            const rect = el.getBoundingClientRect();
            let left = rect.left + window.scrollX;
            let top  = rect.top  + window.scrollY - t.offsetHeight - 8;
            if (top < 4) top = rect.bottom + window.scrollY + 8;
            if (left + 300 > window.innerWidth) left = window.innerWidth - 310;
            t.style.left = left + 'px';
            t.style.top  = top  + 'px';
        }

        document.addEventListener('mouseover', e => {
            const cell = e.target.closest('[data-zp7-tooltip]');
            if (cell) positionTip(e, cell);
        });
        document.addEventListener('mouseout', e => {
            const cell = e.target.closest('[data-zp7-tooltip]');
            if (cell) { const t = tip(); if (t) t.classList.remove('show'); }
        });
    })();

    // AI report popup — delegated hover on .ai-info-icon
    (function initAiReportPopup() {
        const popup = () => document.getElementById('aiReportPopup');

        document.addEventListener('mouseover', e => {
            const icon = e.target.closest('.ai-info-icon');
            if (!icon) return;
            const p = popup(); if (!p) return;

            const raw = icon.dataset.aiReport;
            let html;
            if (!raw) {
                html = `<div class="ai-popup-none">Отчёт не сгенерирован</div>`;
            } else {
                let entry;
                try { entry = JSON.parse(raw); } catch { entry = null; }
                if (!entry) {
                    html = `<div class="ai-popup-none">Отчёт не сгенерирован</div>`;
                } else {
                    const meta = [entry.model, entry.ts].filter(Boolean).join(' · ');
                    html = `<div class="ai-popup-title">${escHtml(entry.project || icon.dataset.project)}</div>`
                        + (meta ? `<div class="ai-popup-meta">${escHtml(meta)}</div>` : '')
                        + `<div class="ai-popup-body">${escHtml(entry.analysis || '')}</div>`;
                }
            }

            p.innerHTML = html;
            p.classList.add('show');

            const rect = icon.getBoundingClientRect();
            let left = rect.right + 8;
            let top  = rect.top + window.scrollY;
            if (left + 350 > window.innerWidth) left = rect.left - 358;
            if (left < 4) left = 4;
            p.style.left = left + 'px';
            p.style.top  = top  + 'px';
        });

        document.addEventListener('mouseout', e => {
            const icon = e.target.closest('.ai-info-icon');
            if (icon) { const p = popup(); if (p) p.classList.remove('show'); }
        });
    })();

    function toDateStr(d) { return d.toISOString().substring(0, 10); }

</script>

<!-- AI Report Popup -->
<div id="aiReportPopup"></div>

<!-- Universal Dialog -->
<div id="dialogOverlay">
    <div id="dialogBox">
        <div style="display:flex;align-items:center;gap:9px;">
            <span id="dialogIcon">ℹ️</span>
            <span id="dialogTitle"></span>
        </div>
        <div id="dialogMsg"></div>
        <input id="dialogInput" type="text" autocomplete="off">
        <div id="dialogButtons"></div>
    </div>
</div>
