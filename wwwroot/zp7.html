<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/themes.css">
    <script src="/js/theme.js"></script>
    <script src="/js/nav.js"></script>

    <title>ZP7</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 11px;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .main-header {
            background: var(--bg1);
            padding: 8px 14px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .main-header h1 { font-size: 15px; color: var(--accent); }

        .header-stats { display: flex; gap: 14px; margin-left: auto; }
        .hstat { font-size: 10px; color: var(--text2); }
        .hstat span { color: var(--text); font-weight: 600; }

        .auto-badge {
            font-size: 10px;
            padding: 2px 7px;
            border-radius: 4px;
            border: 1px solid var(--border);
            cursor: pointer;
            background: var(--bg1);
            color: var(--text2);
        }
        .auto-badge.on { border-color: var(--green-bg); color: var(--green); }

        .content {
            display: flex;
            flex: 1;
            overflow: hidden;
            gap: 5px;
            padding: 5px;
        }

        /* ── LEFT: task list ── */
        .tasks-panel {
            width: 340px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
            background: var(--bg);
        }

        .panel-header {
            background: var(--bg1);
            padding: 6px 10px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 7px;
            flex-shrink: 0;
        }
        .panel-title { font-size: 12px; font-weight: 600; color: var(--accent); }
        .count-badge {
            background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
            padding: 1px 6px; font-size: 10px; color: var(--text2);
        }

        /* ── Toolbar (search) ── */
        .list-toolbar {
            padding: 6px 8px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 6px; flex-shrink: 0;
        }
        .list-toolbar input {
            flex: 1; background: var(--bg2); border: 1px solid var(--border);
            border-radius: 3px; padding: 3px 7px; color: var(--text); font-size: 11px;
        }
        .list-toolbar input:focus { outline: none; border-color: var(--accent); }
        .list-toolbar select {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 3px; padding: 3px 5px; color: var(--text); font-size: 10px;
            cursor: pointer; flex-shrink: 0;
        }
        .list-toolbar select:focus { outline: none; border-color: var(--accent); }

        /* ── Tag filter bar ── */
        .exec-filter-bar {
            background: var(--bg1); padding: 3px 8px;
            border-bottom: 1px solid var(--border);
            display: flex; gap: 4px; flex-wrap: wrap; align-items: center;
            flex-shrink: 0; min-height: 24px;
        }
        .exec-filter-bar:empty { display: none; }
        .tag-filter-label { font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0; margin-right: 2px; }
        .tag-chip {
            font-size: 10px; padding: 1px 7px; border-radius: 10px;
            background: var(--bg2); border: 1px solid var(--border);
            color: var(--text2); cursor: pointer; user-select: none; transition: all 0.12s; white-space: nowrap;
        }
        .tag-chip:hover { border-color: var(--accent); color: var(--text); }
        .tag-chip.active { background: rgba(56,139,253,0.15); border-color: var(--accent); color: var(--accent); }
        .tag-chip.clear-chip { color: var(--text2); border-style: dashed; }
        .tag-chip.clear-chip:hover { color: var(--red); border-color: var(--red); }

        /* ── Scroll container ── */
        .list-scroll { flex: 1; overflow-y: auto; }
        .list-scroll::-webkit-scrollbar { width: 5px; }
        .list-scroll::-webkit-scrollbar-track { background: var(--bg); }
        .list-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* ── Group header ── */
        .group-header {
            padding: 5px 10px 4px;
            display: flex; align-items: center; gap: 6px;
            background: var(--bg1);
            border-top: 2px solid var(--border);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 2;
            cursor: pointer; user-select: none;
        }
        .group-header:hover { background: var(--bg2); }
        .group-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
        .group-name { font-size: 10px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 0.5px; flex: 1; }
        .group-count { font-size: 9px; color: var(--text2); background: var(--bg2); padding: 1px 5px; border-radius: 8px; }
        .group-chevron { font-size: 9px; color: var(--text2); transition: transform 0.15s; display: inline-block; }
        .group-chevron.collapsed { transform: rotate(-90deg); }

        /* ── Schedule rows ── */
        .schedule-row {
            padding: 6px 10px 6px 18px;
            border-bottom: 1px solid var(--border);
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: background 0.08s;
        }
        .schedule-row.group-child { padding-left: 24px; border-left: 2px solid var(--border); }
        .schedule-row:hover  { background: var(--bg2); }
        .schedule-row.active { background: var(--bg3); }
        .schedule-row.row-disabled { opacity: 0.45; }
        .ungrouped-separator { border-top: 2px solid var(--border); }

        .row-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .row-dot.enabled  { background: var(--green); }
        .row-dot.disabled { background: var(--border); }
        .row-dot.working  { background: var(--green); box-shadow: 0 0 4px var(--green); animation: pulse 1.5s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .row-info { flex: 1; min-width: 0; }
        .row-name { font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-hi); }
        .row-sub  { font-size: 9px; color: var(--text2); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
        .row-counts { font-size: 9px; color: var(--text2); display: flex; gap: 4px; align-items: center; }
        .row-done   { color: var(--green); font-weight: 600; }
        .row-total  { color: var(--text2); }

        /* task status badges */
        .task-status {
            font-size: 9px; padding: 1px 7px; border-radius: 4px;
            text-align: center; font-weight: 400; letter-spacing: 0.2px;
            text-transform: uppercase;
        }
        .st-Stop     { background: var(--bg2);        color: var(--text2); }
        .st-Schedule { background: var(--blue-tint);  color: var(--accent); border: 1px solid var(--blue-border); }
        .st-Perform  { background: var(--green-tint); color: var(--green);  border: 1px solid var(--green-bg); }
        .st-Complete { background: var(--purple-tint);color: var(--purple); }
        .st-Fail     { background: var(--red-tint);   color: var(--red);    border: 1px solid var(--red-bg); }
        .st-Newbie   { background: var(--yellow-tint);color: var(--yellow); }
        .st-empty    { background: var(--bg2);        color: var(--muted); }

        /* machine badge */
        .machine-badge {
            display: inline-block; font-size: 8px; padding: 0 5px; border-radius: 8px;
            background: var(--bg2); border: 1px solid var(--border);
            color: var(--text2); font-family: monospace; white-space: nowrap; max-width: 80px;
            overflow: hidden; text-overflow: ellipsis;
        }

        /* ── RIGHT panels ── */
        .right-col {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0;
            overflow: hidden;
        }

        .h-resizer {
            height: 5px;
            background: var(--bg2);
            cursor: row-resize;
            flex-shrink: 0;
            margin: 1px 0;
            border-radius: 2px;
        }
        .h-resizer:hover { background: var(--accent); }

        .detail-panel {
            flex: 1;
            min-height: 0;
            border: 1px solid var(--border);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }

        .detail-body {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .detail-body::-webkit-scrollbar { width: 5px; }
        .detail-body::-webkit-scrollbar-track { background: var(--bg); }
        .detail-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .detail-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--muted);
            font-size: 12px;
        }

        .detail-name { font-size: 15px; color: var(--text-hi); font-weight: 600; margin-bottom: 3px; }
        .detail-path { font-size: 9px; color: var(--muted); margin-bottom: 10px; word-break: break-all; }

        .detail-actions { display: flex; gap: 7px; margin-bottom: 12px; flex-wrap: wrap; }

        .btn {
            padding: 4px 12px;
            border-radius: 5px;
            border: 1px solid;
            cursor: pointer;
            font-size: 11px;
            font-weight: 600;
            transition: opacity 0.15s;
        }
        .btn:hover { opacity: 0.8; }
        .btn:disabled { opacity: 0.4; cursor: default; }

        .btn-start  { background: var(--green-bg); border-color: var(--green-bg2); color: #fff; }
        .btn-stop   { background: var(--red-bg2); border-color: var(--red-bg); color: #fff; }
        .btn-update { background: var(--bg2); border-color: var(--border); color: var(--text); }

        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }

        .detail-section {
            background: var(--bg1);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 7px 9px;
        }
        .detail-section h4 {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--accent);
            margin-bottom: 5px;
        }

        .kv { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .kv .k { color: var(--text2); font-size: 10px; }
        .kv .v { color: var(--text-hi); font-size: 10px; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; text-align: right; }

        .tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
        .tag {
            font-size: 9px;
            padding: 1px 6px;
            border-radius: 10px;
            background: var(--bg2);
            border: 1px solid var(--border);
            color: var(--text2);
        }

        /* Commands panel */
        .commands-panel {
            height: 180px;
            flex-shrink: 0;
            border: 1px solid var(--border);
            border-radius: 6px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
        }

        .cmd-list { flex: 1; overflow-y: auto; }
        .cmd-list::-webkit-scrollbar { width: 5px; }
        .cmd-list::-webkit-scrollbar-track { background: var(--bg); }
        .cmd-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .cmd-row {
            display: grid;
            grid-template-columns: 70px 80px 80px 1fr 90px;
            gap: 5px;
            padding: 4px 9px;
            border-bottom: 1px solid var(--bg2);
            align-items: center;
            font-size: 10px;
        }

        .cmd-status-pending { color: var(--yellow); }
        .cmd-status-done    { color: var(--green); }
        .cmd-status-error   { color: var(--red); }
        .cmd-action-start   { color: var(--green); }
        .cmd-action-stop    { color: var(--red); }
        .cmd-action-update  { color: var(--accent); }
        .cmd-result { color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .cmd-time   { color: var(--muted); }
        .cmd-task   { color: var(--text2); }

        .empty-msg { padding: 16px; text-align: center; color: var(--muted); }

        /* Resizer */
        .resizer {
            width: 4px;
            background: var(--bg2);
            cursor: col-resize;
            flex-shrink: 0;
            border-radius: 2px;
        }
        .resizer:hover { background: var(--accent); }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--bg1);
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 580px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 9px;
            flex-shrink: 0;
        }
        .modal-header h3 { font-size: 13px; color: var(--text-hi); flex: 1; }
        .modal-close { background: none; border: none; color: var(--text2); font-size: 16px; cursor: pointer; padding: 0 4px; }
        .modal-close:hover { color: var(--text-hi); }

        .modal-body { flex: 1; overflow-y: auto; padding: 10px 14px; }
        .modal-body::-webkit-scrollbar { width: 5px; }
        .modal-body::-webkit-scrollbar-track { background: var(--bg1); }
        .modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .modal-footer {
            padding: 8px 14px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 7px;
            justify-content: flex-end;
            flex-shrink: 0;
        }

        .field-group { margin-bottom: 9px; }
        .field-label { font-size: 10px; color: var(--text2); margin-bottom: 2px; display: block; }
        .field-label .field-key { color: var(--muted); font-size: 9px; margin-left: 5px; }

        .field-input, .field-select, .field-textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-hi);
            border-radius: 4px;
            padding: 4px 7px;
            font-size: 11px;
            font-family: inherit;
            outline: none;
        }
        .field-input:focus, .field-select:focus, .field-textarea:focus { border-color: var(--accent); }
        .field-textarea { resize: vertical; min-height: 52px; }

        .field-bool { display: flex; align-items: center; gap: 7px; }
        .field-bool input[type=checkbox] { width: 13px; height: 13px; cursor: pointer; }

        .section-divider {
            margin: 12px 0 6px;
            padding: 4px 9px;
            background: var(--bg2);
            border-left: 3px solid var(--accent);
            border-radius: 0 4px 4px 0;
            font-size: 9px;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .modal-tabs {
            display: flex;
            gap: 2px;
            padding: 6px 10px 0;
            border-bottom: 1px solid var(--border);
            background: var(--bg1);
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .modal-tab {
            padding: 4px 10px;
            font-size: 10px;
            cursor: pointer;
            color: var(--text2);
            border: 1px solid transparent;
            border-bottom: none;
            border-radius: 4px 4px 0 0;
            background: none;
            margin-bottom: -1px;
        }
        .modal-tab:hover { color: var(--text); }
        .modal-tab.active { color: var(--text-hi); background: var(--bg); border-color: var(--border); border-bottom-color: var(--bg); }
        .tab-pane { display: none; padding: 10px 14px; }
        .tab-pane.active { display: block; }

        .field-multiselect {
            display: flex; flex-wrap: wrap; gap: 3px; padding: 4px;
            background: var(--bg); border: 1px solid var(--border); border-radius: 4px; min-height: 28px;
        }
        .field-multiselect label {
            display: flex; align-items: center; gap: 3px; padding: 2px 7px;
            background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
            cursor: pointer; font-size: 10px; color: var(--text);
        }
        .field-multiselect label:hover { border-color: var(--accent); }
        .field-multiselect input[type=checkbox]:checked + span { color: var(--accent); }

        /* ── Logs area ── */
        .logs-area {
            display: none;
            flex: 1;
            min-height: 0;
            overflow: hidden;
            gap: 0;
        }
        .logs-area.visible { display: flex; }

        .logs-panel, .http-panel {
            display: flex; flex-direction: column; overflow: hidden;
            border: 1px solid var(--border); border-radius: 6px;
            background: var(--bg); min-width: 80px;
        }
        .logs-panel { flex: 1; }
        .http-panel { flex: 1; }

        .lp-header {
            background: var(--bg1); padding: 4px 9px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 5px; flex-shrink: 0; justify-content: space-between;
        }
        .lp-title { font-size: 10px; font-weight: 600; color: var(--accent); }
        .lp-clear-btn { background: none; border: none; cursor: pointer; color: var(--muted2); font-size: 12px; padding: 0 2px; line-height: 1; }
        .lp-clear-btn:hover { color: var(--red); }
        .lp-controls {
            background: var(--bg1); padding: 3px 7px; border-bottom: 1px solid var(--border);
            display: flex; gap: 4px; flex-shrink: 0;
        }
        .lp-controls select, .lp-controls input, .lp-controls button {
            padding: 2px 6px; font-size: 9px;
            background: var(--bg); color: var(--text);
            border: 1px solid var(--border); border-radius: 4px; font-family: inherit; cursor: pointer;
        }
        .lp-controls button:hover { background: var(--bg2); }
        .lp-content { flex: 1; overflow-y: auto; min-height: 0; }
        .lp-content::-webkit-scrollbar { width: 4px; }
        .lp-content::-webkit-scrollbar-track { background: var(--bg); }
        .lp-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .tl-entry {
            padding: 2px 9px; border-bottom: 1px solid var(--bg2); border-left: 3px solid transparent;
        }
        .tl-entry.ERROR   { border-left-color: var(--red); background: var(--red-tint2); }
        .tl-entry.WARNING { border-left-color: var(--yellow); }
        .tl-header { display: flex; gap: 5px; align-items: center; }
        .tl-ts  { color: var(--text3); font-family: monospace; font-size: 9px; flex-shrink: 0; }
        .tl-lvl { padding: 1px 3px; border-radius: 3px; font-size: 8px; font-family: monospace; text-transform: uppercase; flex-shrink: 0; }
        .tl-lvl.ERROR   { background: rgba(248,81,73,0.15);  color: var(--red-lo); }
        .tl-lvl.WARNING { background: rgba(210,153,34,0.15); color: var(--yellow-lo); }
        .tl-lvl.INFO    { background: rgba(56,139,253,0.15); color: var(--accent-lo); }
        .tl-lvl.DEBUG   { background: rgba(110,118,129,0.1); color: var(--text2); }
        .tl-acc { color: var(--green-hi); font-size: 9px; }
        .tl-msg {
            color: var(--text); font-size: 10px; padding: 1px 0;
            word-break: break-word; line-height: 1.35;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }
        .tl-msg:hover { -webkit-line-clamp: unset; background: rgba(110,118,129,0.07); cursor: pointer; }

        .th-entry {
            padding: 3px 9px; border-bottom: 1px solid var(--bg2);
            display: grid; grid-template-columns: 52px 36px 1fr 38px 50px 68px;
            gap: 4px; align-items: center; font-size: 9px;
        }
        .th-entry:hover { background: var(--bg1); }
        .th-method { padding: 1px 3px; border-radius: 3px; font-size: 8px; font-weight: 600; font-family: monospace; text-align: center; }
        .th-method.GET    { background: rgba(88,166,255,0.15); color: var(--accent-lo); }
        .th-method.POST   { background: rgba(63,185,80,0.15);  color: var(--green-lo); }
        .th-method.PUT    { background: rgba(210,153,34,0.15); color: var(--yellow-lo); }
        .th-method.DELETE { background: rgba(248,81,73,0.15);  color: var(--red-lo); }
        .th-status { padding: 1px 3px; border-radius: 3px; font-size: 8px; font-weight: 600; font-family: monospace; text-align: center; }
        .th-status.s2xx { background: rgba(63,185,80,0.15);  color: var(--green-lo); }
        .th-status.s3xx { background: rgba(88,166,255,0.15); color: var(--accent-lo); }
        .th-status.s4xx { background: rgba(210,153,34,0.15); color: var(--yellow-lo); }
        .th-status.s5xx { background: rgba(248,81,73,0.15);  color: var(--red-lo); }
        .th-url  { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
        .th-dur  { color: var(--text2); font-family: monospace; text-align: right; }
        .th-acc  { color: var(--green-hi); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .lp-empty { padding: 16px; text-align: center; color: var(--muted); font-size: 10px; }

        .logs-resizer {
            width: 5px; background: var(--bg2); cursor: col-resize;
            flex-shrink: 0; margin: 0 1px; border-radius: 2px;
        }
        .logs-resizer:hover { background: var(--accent); }

        /* ── Universal Dialog ── */
        #dialogOverlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75);
            z-index: 999; align-items: center; justify-content: center;
        }
        #dialogOverlay.open { display: flex; }
        #dialogBox {
            background: var(--bg1); border: 1px solid var(--border); border-radius: 8px;
            width: 340px; padding: 18px; display: flex; flex-direction: column; gap: 12px;
        }
        #dialogIcon { font-size: 20px; }
        #dialogTitle { font-size: 13px; font-weight: 600; color: var(--text-hi); }
        #dialogMsg { font-size: 12px; color: var(--text2); line-height: 1.5; }
        #dialogInput {
            background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
            color: var(--text); padding: 5px 9px; font-size: 12px; width: 100%; box-sizing: border-box; display: none;
        }
        #dialogInput:focus { outline: none; border-color: var(--accent); }
        #dialogButtons { display: flex; gap: 7px; justify-content: flex-end; }
        .dialog-btn {
            padding: 4px 12px; border-radius: 6px; border: 1px solid var(--border);
            font-size: 11px; cursor: pointer; background: var(--bg2); color: var(--text);
        }
        .dialog-btn:hover { background: var(--border); }
        .dialog-btn.primary { background: var(--green-bg); border-color: var(--green-bg); color: #fff; }
        .dialog-btn.primary:hover { background: var(--green-bg2); }
        .dialog-btn.danger { background: var(--red-bg); border-color: var(--red-bg); color: #fff; }
        .dialog-btn.danger:hover { background: var(--red); }
        /* ── PM Heatmap Pane ── */
        .zp7-heatmap-pane {
            height: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .zp7-heatmap-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 2px 8px;
            flex-shrink: 0;
        }
        .zp7-heatmap-title { font-size: 12px; font-weight: 600; color: var(--accent); }
        .zp7-heatmap-hint  { font-size: 10px; color: var(--muted); margin-left: 4px; flex: 1; }
        .zp7-heatmap-refresh {
            margin-left: auto;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text2);
            border-radius: 4px;
            padding: 1px 7px;
            cursor: pointer;
            font-size: 12px;
        }
        .zp7-heatmap-refresh:hover { color: var(--accent); border-color: var(--accent); }
        .zp7-heatmap-content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .zp7-heatmap-content::-webkit-scrollbar { width: 5px; }
        .zp7-heatmap-content::-webkit-scrollbar-track { background: var(--bg); }
        .zp7-heatmap-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        .zp7-heatmap-loading { color: var(--muted); font-size: 11px; padding: 20px; text-align: center; }

        /* tooltip (идентично report.html) */
        .zp7-tooltip {
            position: fixed;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            color: var(--text);
            font-size: 12px;
            white-space: pre-wrap;
            pointer-events: none;
            z-index: 9000;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            display: none;
            max-width: 400px;
            line-height: 1.5;
        }
        .zp7-tooltip.show { display: block; }
        .zp7-tooltip-title { font-weight: 600; margin-bottom: 8px; color: var(--accent); font-size: 13px; }
        .zp7-tooltip-time  { color: var(--text2); font-size: 11px; margin-bottom: 8px; }
        .zp7-tooltip-ok    { color: var(--green); background: rgba(63,185,80,0.1); padding: 4px 8px; border-radius: 4px; display: inline-block; font-size: 11px; }
        .zp7-tooltip-err   { color: var(--red);   background: rgba(248,81,73,0.1);  padding: 4px 8px; border-radius: 4px; display: inline-block; font-size: 11px; }
        .zp7-tooltip-report { margin-top: 8px; color: var(--text2); font-family: monospace; font-size: 11px; padding: 8px; background: var(--bg2); border-radius: 4px; border-left: 3px solid var(--border); }
        .zp7-tooltip-report-ok { color: var(--green); background: rgba(63,185,80,0.05); border-left-color: var(--green); }
        
        /* Точно как report.html */
        .heatmap-with-stats   { display: flex; gap: 12px; align-items: stretch; }
        .heatmap-project-card { width: 160px; flex-shrink: 0; }
        .project-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        .project-name { font-size: 13px; font-weight: 600; color: var(--accent); margin-bottom: 8px; }
        .progress-bar { height: 6px; background: var(--bg1); border-radius: 3px; overflow: hidden; margin-bottom: 10px; }
        .project-stats { display: flex; flex-direction: column; gap: 3px; font-size: 10px; color: var(--text2); }
        .stat-row { display: flex; justify-content: space-between; align-items: center; }
        .stat-good    { color: var(--green); font-weight: 600; }
        .stat-bad     { color: var(--red);   font-weight: 600; }
        .stat-neutral { color: var(--text2); font-weight: 600; }
        .heatmap-content  { flex: 1; min-width: 0; }
        .heatmap-row      { display: flex; align-items: center; }
        .cells-container  { display: flex; flex-wrap: wrap; gap: 2px; max-width: calc((11px + 2px) * 100); }
        .heatmap-cell {
            width: 11px; height: 11px;
            border-radius: 2px;
            border: 1px solid var(--border);
            background: transparent;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .heatmap-cell.success          { background: var(--green-bg); border-color: var(--green-bg2); }
        .heatmap-cell.error            { background: var(--red-bg);   border-color: var(--red); }
        .heatmap-cell.success-yesterday{ background: #1a5c28; border-color: #247a35; }
        .heatmap-cell.error-yesterday  { background: #a32a27; border-color: #c93a36; }
        .heatmap-cell.success-2days    { background: #123819; border-color: #1a5024; }
        .heatmap-cell.error-2days      { background: #6b1e1d; border-color: #8d2826; }
        .heatmap-cell.success-old      { background: #0a1a0d; border-color: #112b15; }
        .heatmap-cell.error-old        { background: #3a1210; border-color: #5a1a18; }
        .heatmap-cell:hover { transform: scale(1.3); z-index: 10; box-shadow: 0 0 8px rgba(255,255,255,0.3); }

        /* AI report icon */
        .ai-info-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 14px; height: 14px;
            border-radius: 50%;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-size: 9px;
            font-weight: 700;
            cursor: pointer;
            flex-shrink: 0;
            margin-left: 4px;
            line-height: 1;
            user-select: none;
            transition: background 0.12s;
        }
        .ai-info-icon:hover { background: rgba(56,139,253,0.15); }

        /* AI report popup */
        #aiReportPopup {
            position: fixed;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
            color: var(--text);
            font-size: 11px;
            pointer-events: none;
            z-index: 9500;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            display: none;
            max-width: 340px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-break: break-word;
        }
        #aiReportPopup.show { display: block; }
        .ai-popup-title { font-size: 10px; font-weight: 600; color: var(--accent); margin-bottom: 6px; }
        .ai-popup-meta  { font-size: 9px; color: var(--muted); margin-bottom: 6px; }
        .ai-popup-body  { font-size: 11px; color: var(--text); }
        .ai-popup-none  { font-size: 11px; color: var(--muted); font-style: italic; }
    </style>

</head>
<body>

<div class="main-header">
    <h1>ZP7 Tasks</h1>
    <div class="header-stats">
        <div class="hstat">Tasks: <span id="hTotal">0</span></div>
        <div class="hstat">Running: <span id="hRunning">0</span></div>
        <div class="hstat">Scheduled: <span id="hScheduled">0</span></div>
        <div class="hstat">Stopped: <span id="hStopped">0</span></div>
    </div>
    <button class="auto-badge on" id="autoBtn" onclick="toggleAuto()">AUTO ON</button>
    <button class="auto-badge" id="themeBtn" onclick="cycleTheme()" title="Switch theme">THEME</button>
</div>

<div class="content">

    <!-- LEFT: task list -->
    <div class="tasks-panel" id="tasksPanel">
        <div class="panel-header">
            <span class="panel-title">Tasks</span>
            <span class="count-badge" id="visibleCount">0</span>
            <div style="margin-left:auto;display:flex;gap:5px;">
                <button class="auto-badge" onclick="refreshTasks()" style="color:#c9d1d9;">↺ Refresh</button>
            </div>
        </div>

        <div class="list-toolbar">
            <input type="text" id="nameFilter" placeholder="Search..." oninput="applyFilters()">
            <select id="statusFilter" onchange="applyFilters()">
                <option value="">All</option>
                <option value="Perform">Perform</option>
                <option value="Schedule">Schedule</option>
                <option value="Stop">Stop</option>
                <option value="Fail">Fail</option>
                <option value="Complete">Complete</option>
            </select>
            <select id="workFilter" onchange="applyFilters()">
                <option value="">●</option>
                <option value="1">Work</option>
                <option value="0">Idle</option>
            </select>
        </div>

        <div class="exec-filter-bar" id="tagFilterBar">
            <span class="tag-filter-label">Tags:</span>
            <span class="tag-chip clear-chip" id="tagClearAll" onclick="clearTagFilters()" style="display:none">✕</span>
        </div>

        <div class="list-scroll" id="tasksList">
            <div class="empty-msg">Loading...</div>
        </div>
    </div>

    <div class="resizer" id="resizer"></div>

    <!-- RIGHT -->
    <div class="right-col">

        <div class="detail-panel">
            <div class="panel-header">
                <span class="panel-title">Task Detail</span>
                <span id="detailTaskId" style="font-size:10px;color:#484f58;margin-left:7px;"></span>
            </div>
            <div class="detail-body" id="detailBody">
            </div>
        </div>
        <div id="pmTooltip" class="zp7-tooltip"></div>

        <div class="h-resizer" id="hResizerTop"></div>

        <div class="logs-area" id="logsArea">
            <div class="logs-panel" id="lpLogsPanel">
                <div class="lp-header">
                    <span class="lp-title">📋 Logs</span>
                    <button class="lp-clear-btn" onclick="clearLogsByTask()" title="Delete logs for this task">🗑</button>
                </div>
                <div class="lp-controls">
                    <select id="lp_level" onchange="refreshTaskLogs()">
                        <option value="">All Levels</option>
                        <option value="DEBUG">DEBUG</option>
                        <option value="INFO">INFO</option>
                        <option value="WARNING">WARNING</option>
                        <option value="ERROR">ERROR</option>
                    </select>
                    <input type="number" id="lp_limit" value="50" min="10" max="500" step="10" style="width:46px;" onchange="refreshTaskLogs()">
                    <button onclick="refreshTaskLogs()">↺</button>
                </div>
                <div class="lp-content" id="lpLogsContent">
                    <div class="lp-empty">No logs</div>
                </div>
            </div>

            <div class="logs-resizer" id="logsResizer"></div>

            <div class="logs-panel" id="lpHttpPanel">
                <div class="lp-header">
                    <span class="lp-title">🌐 HTTP</span>
                    <button class="lp-clear-btn" onclick="clearHttpLogsByTask()" title="Delete HTTP logs for this task">🗑</button>
                </div>
                <div class="lp-controls">
                    <select id="lp_method" onchange="refreshTaskHttp()">
                        <option value="">All Methods</option>
                        <option value="GET">GET</option>
                        <option value="POST">POST</option>
                        <option value="PUT">PUT</option>
                        <option value="DELETE">DELETE</option>
                    </select>
                    <select id="lp_status" onchange="refreshTaskHttp()">
                        <option value="">All Status</option>
                        <option value="2">2xx</option>
                        <option value="3">3xx</option>
                        <option value="4">4xx</option>
                        <option value="5">5xx</option>
                    </select>
                    <input type="text" id="lp_url" placeholder="URL..." style="width:80px;" oninput="refreshTaskHttp()">
                    <input type="number" id="lp_hlimit" value="50" min="10" max="500" step="10" style="width:46px;" onchange="refreshTaskHttp()">
                    <button onclick="refreshTaskHttp()">↺</button>
                </div>
                <div class="lp-content" id="lpHttpContent">
                    <div class="lp-empty">No traffic</div>
                </div>
            </div>
        </div>

        <div class="h-resizer" id="hResizerBot"></div>

        <div class="commands-panel">
            <div class="panel-header">
                <span class="panel-title">Commands Queue</span>
                <span class="count-badge" id="cmdCount">0</span>
                <div style="margin-left:auto;display:flex;gap:5px;">
                    <select id="cmdStatusFilter" onchange="refreshCommands()" style="background:#0d1117;border:1px solid #30363d;color:#c9d1d9;border-radius:4px;padding:2px 5px;font-size:10px;">
                        <option value="">All</option>
                        <option value="pending">Pending</option>
                        <option value="done">Done</option>
                        <option value="error">Error</option>
                    </select>
                    <button class="auto-badge" onclick="clearCommands('done')" style="color:#8b949e;" title="Clear done commands">✗ Done</button>
                    <button class="auto-badge" onclick="clearCommands('all')" style="color:#f85149;" title="Clear all commands">✗ All</button>
                    <button class="auto-badge" onclick="refreshCommands()" style="color:#c9d1d9;">↺</button>
                </div>
            </div>
            <div class="cmd-list" id="cmdList">
                <div class="empty-msg">No commands</div>
            </div>
        </div>

    </div>
</div>

<!-- Execution Settings Modal -->
<div class="modal-overlay" id="execModal">
    <div class="modal" style="width:460px;">
        <div class="modal-header">
            <h3 id="execModalTitle">Execution Settings</h3>
            <button class="modal-close" onclick="closeExecModal()">✕</button>
        </div>
        <div class="modal-body" id="execModalBody" style="padding:14px;"></div>
        <div class="modal-footer">
            <button class="btn btn-update" onclick="closeExecModal()">Cancel</button>
            <button class="btn btn-start" onclick="saveExecSettings()">💾 Apply</button>
        </div>
    </div>
</div>

<!-- Scheduler Settings Modal -->
<div class="modal-overlay" id="schedulerModal">
    <div class="modal" style="width:460px;">
        <div class="modal-header">
            <h3 id="schedulerModalTitle">Scheduler Settings</h3>
            <button class="modal-close" onclick="closeSchedulerModal()">✕</button>
        </div>
        <div class="modal-body" id="schedulerModalBody" style="padding:14px;"></div>
        <div class="modal-footer">
            <button class="btn btn-update" onclick="closeSchedulerModal()">Cancel</button>
            <button class="btn btn-start" onclick="saveSchedulerSettings()">💾 Apply</button>
        </div>
    </div>
</div>

<!-- Settings Modal -->
<div class="modal-overlay" id="settingsModal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modalTitle">Settings</h3>
            <button class="modal-close" onclick="closeModal()">✕</button>
        </div>
        <div class="modal-tabs" id="modalTabs"></div>
        <div class="modal-body" id="modalBody">
            <div class="empty-msg">Loading...</div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-update" onclick="closeModal()">Cancel</button>
            <button class="btn btn-update" id="copyPayloadBtn" onclick="copySettingsPayload()" style="border-color:#58a6ff;color:#58a6ff;" title="Copy settings as scheduler payload to clipboard">📋 Copy Payload</button>
            <button class="btn btn-start" onclick="saveSettings()">💾 Save & Apply</button>
        </div>
    </div>
</div>

<script>
    const SERVER = window.location.origin;
    let allTasks = [];
    let selectedTaskId = null;
    let autoInterval = null;
    let autoOn = true;

    // Active tag filters (Set of tag strings)
    let activeTagFilters = new Set();

    // ── STATE PERSISTENCE ──
    const PM_STATE_KEY = 'pm_ui_state';

    function _saveState() {
        try {
            localStorage.setItem(PM_STATE_KEY, JSON.stringify({
                selectedTaskId,
                groupCollapsed: _groupCollapsed,
                tagFilters:     [...activeTagFilters],
                nameFilter:     document.getElementById('nameFilter')?.value    || '',
                statusFilter:   document.getElementById('statusFilter')?.value  || '',
                workFilter:     document.getElementById('workFilter')?.value    || '',
                cmdStatusFilter:document.getElementById('cmdStatusFilter')?.value || ''
            }));
        } catch {}
    }

    function _restoreState() {
        try {
            const raw = localStorage.getItem(PM_STATE_KEY);
            if (!raw) return;
            const s = JSON.parse(raw);
            if (s.groupCollapsed) Object.assign(_groupCollapsed, s.groupCollapsed);
            if (s.tagFilters)     activeTagFilters = new Set(s.tagFilters);
            if (s.selectedTaskId) selectedTaskId   = s.selectedTaskId;
            if (s.nameFilter)     { const el = document.getElementById('nameFilter');     if (el) el.value = s.nameFilter; }
            if (s.statusFilter)   { const el = document.getElementById('statusFilter');   if (el) el.value = s.statusFilter; }
            if (s.workFilter)     { const el = document.getElementById('workFilter');     if (el) el.value = s.workFilter; }
            if (s.cmdStatusFilter){ const el = document.getElementById('cmdStatusFilter');if (el) el.value = s.cmdStatusFilter; }
        } catch {}
    }

    // ── INIT ──
    window.addEventListener('DOMContentLoaded', () => {
        _restoreState();
        refreshTasks();
        refreshCommands();
        startAuto();
        initResizer();
        initLogsResizer();
        initHResizers();
        _showHeatmap();
    });

    function startAuto() {
        autoInterval = setInterval(() => {
            refreshTasks();
            refreshCommands();
        }, 3000);
    }

    function toggleAuto() {
        autoOn = !autoOn;
        const btn = document.getElementById('autoBtn');
        if (autoOn) {
            btn.textContent = 'AUTO ON';
            btn.classList.add('on');
            startAuto();
        } else {
            btn.textContent = 'AUTO OFF';
            btn.classList.remove('on');
            clearInterval(autoInterval);
        }
    }

    // ── TASKS ──
    async function refreshTasks() {
        try {
            const r = await fetch(`${SERVER}/zp/tasks`);
            const data = await r.json();
            allTasks = data.filter(t => t.Name && t.Name.trim() !== '');
            updateHeaderStats();
            updateTagFilterBar();
            applyFilters();
            // restore selected task detail on first load
            if (selectedTaskId && !_currentTaskId) {
                const task = allTasks.find(t => t.Id === selectedTaskId);
                if (task) renderDetail(task);
                else selectedTaskId = null;
            }
        } catch (e) {
            console.error('Tasks fetch failed:', e);
        }
    }

    function updateHeaderStats() {
        const running   = allTasks.filter(t => t.ExecutionSettings_IsWork === 'True').length;
        const scheduled = allTasks.filter(t => t.ExecutionSettings_Status === 'Schedule').length;
        const stopped   = allTasks.filter(t => t.ExecutionSettings_Status === 'Stop').length;
        document.getElementById('hTotal').textContent     = allTasks.length;
        document.getElementById('hRunning').textContent   = running;
        document.getElementById('hScheduled').textContent = scheduled;
        document.getElementById('hStopped').textContent   = stopped;
    }

    // Extract project name: part of task name before first "."
    function getProject(task) {
        const name = task.Name || '';
        const dot = name.indexOf('.');
        return dot > 0 ? name.substring(0, dot).trim() : name.trim();
    }

    // Extract tags from GroupLabels
    function getTags(task) {
        return (task.ExecutionSettings_GroupLabels || '')
            .split(',')
            .map(g => g.trim())
            .filter(Boolean);
    }

    // Collect all unique tags across all tasks
    function getAllTags() {
        const set = new Set();
        allTasks.forEach(t => getTags(t).forEach(tag => set.add(tag)));
        return [...set].sort();
    }

    // ── TAG FILTER BAR ──
    function updateTagFilterBar() {
        const bar = document.getElementById('tagFilterBar');
        const allTags = getAllTags();

        // Keep only valid active filters
        activeTagFilters = new Set([...activeTagFilters].filter(t => allTags.includes(t)));

        const clearBtn = document.getElementById('tagClearAll');
        clearBtn.style.display = activeTagFilters.size > 0 ? 'inline-block' : 'none';

        // Remove old chips (keep label + clearAll)
        bar.querySelectorAll('.tag-chip:not(.clear-chip)').forEach(el => el.remove());

        allTags.forEach(tag => {
            const chip = document.createElement('span');
            chip.className = 'tag-chip' + (activeTagFilters.has(tag) ? ' active' : '');
            chip.textContent = tag;
            chip.onclick = () => toggleTagFilter(tag);
            bar.appendChild(chip);
        });
    }

    function toggleTagFilter(tag) {
        if (activeTagFilters.has(tag)) {
            activeTagFilters.delete(tag);
        } else {
            activeTagFilters.add(tag);
        }
        updateTagFilterBar();
        applyFilters();
        _saveState();
    }

    function clearTagFilters() {
        activeTagFilters.clear();
        updateTagFilterBar();
        applyFilters();
        _saveState();
    }

    // ── FILTERS ──
    function applyFilters() {
        const name   = document.getElementById('nameFilter').value.toLowerCase();
        const status = document.getElementById('statusFilter').value;
        const work   = document.getElementById('workFilter').value;

        const filtered = allTasks.filter(t => {
            if (name   && !t.Name.toLowerCase().includes(name)) return false;
            if (status && t.ExecutionSettings_Status !== status) return false;
            if (work === '1' && t.ExecutionSettings_IsWork !== 'True') return false;
            if (work === '0' && t.ExecutionSettings_IsWork === 'True') return false;
            // Tag filter: task must have ALL active tags
            if (activeTagFilters.size > 0) {
                const taskTags = new Set(getTags(t));
                for (const tag of activeTagFilters) {
                    if (!taskTags.has(tag)) return false;
                }
            }
            return true;
        });

        renderTasks(filtered);
        document.getElementById('visibleCount').textContent = filtered.length;
        _saveState();
    }

    // collapsed state per project key
    // _groupCollapsed keys: "machine::project" for project groups, "machine::" for machine groups
    const _groupCollapsed = {};
    let _groupsInitialized = false;
    function renderTasks(tasks) {
        const container = document.getElementById('tasksList');
        if (!tasks.length) {
            container.innerHTML = '<div class="empty-msg">No tasks match filters</div>';
            return;
        }

        // getGroupName: prefix before first "."
        function grpOf(t) {
            const name = t.Name || '';
            const dot  = name.indexOf('.');
            return dot > 0 ? name.substring(0, dot).trim() : '';
        }

        // Count members per group
        const groupCounts = {};
        tasks.forEach(t => {
            const g = grpOf(t);
            if (g) groupCounts[g] = (groupCounts[g] || 0) + 1;
        });

        // Sort: grouped (size>1) first by group name; ungrouped last
        const sorted = [...tasks].sort((a, b) => {
            const ga = grpOf(a), gb = grpOf(b);
            const showA = ga && groupCounts[ga] > 1;
            const showB = gb && groupCounts[gb] > 1;
            if (showA && !showB) return -1;
            if (!showA && showB) return 1;
            if (showA && showB) return ga < gb ? -1 : ga > gb ? 1 : 0;
            return 0;
        });

        if (!_groupsInitialized) {
            _groupsInitialized = true;
            Object.keys(groupCounts).forEach(function(g) {
                if (groupCounts[g] > 1 && !(_groupCollapsed[g] === true))
                    _groupCollapsed[g] = false;
            });
        }

        let html = '';
        let lastGrp = null;
        let firstUngrouped = true;

        sorted.forEach(t => {
            const grp     = grpOf(t);
            const showGrp = grp && groupCounts[grp] > 1;
            const groupKey = grp;
            const collapsed = showGrp && _groupCollapsed[groupKey] === false;

            // Group header
            if (showGrp && grp !== lastGrp) {
                const grpRunning = sorted.filter(x => grpOf(x) === grp && x.ExecutionSettings_IsWork === 'True').length;
                const dots = grpRunning > 0
                    ? Array(Math.min(grpRunning, 5)).fill('<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);margin-right:2px"></span>').join('')
                    : '';
                const isCollapsed = _groupCollapsed[groupKey] === false;
                html += `<div class="group-header" onclick="toggleGroupFlat('${escHtml(groupKey)}',this)">`
                    + `<span class="group-dot"></span>`
                    + `<span class="group-name">${escHtml(grp)}</span>`
                    + (dots ? `<span>${dots}</span>` : '')
                    + `<span class="group-count">${groupCounts[grp]}</span>`
                    + `<span class="group-chevron${isCollapsed ? ' collapsed' : ''}">&#9660;</span>`
                    + `</div>`;
                lastGrp = grp;
            } else if (!showGrp) {
                if (lastGrp !== null && firstUngrouped) {
                    html += '<div class="ungrouped-separator"></div>';
                    firstUngrouped = false;
                }
                if (lastGrp !== null) lastGrp = null;
            }

            if (collapsed) return;

            const status   = t.ExecutionSettings_Status || '';
            const stClass  = status ? `st-${status}` : 'st-empty';
            const isWork   = t.ExecutionSettings_IsWork === 'True';
            const done     = t.ExecutionSettings_DoneSuccessfully || '0';
            const total    = t.ExecutionSettings_DoneAll || '0';
            const isActive = t.Id === selectedTaskId;
            const machine  = t.machine || '';

            const shortName = showGrp && t.Name.startsWith(grp + '.')
                ? t.Name.substring(grp.length + 1)
                : t.Name;

            const subLine = machine ? `<span class="machine-badge">${escHtml(machine)}</span>` : '';

            html += `<div class="schedule-row${showGrp ? ' group-child' : ''}${isActive ? ' active' : ''}" onclick="selectTask('${escHtml(t.Id)}')">`
                + `<span class="row-dot ${isWork ? 'working' : 'enabled'}" title="${isWork ? 'Running' : 'Idle'}"></span>`
                + `<div class="row-info">`
                + `<div class="row-name">${escHtml(shortName)}</div>`
                + (subLine ? `<div class="row-sub">${subLine}</div>` : '')
                + `</div>`
                + `<div class="row-right">`
                + `<span class="task-status ${stClass}">${status || '—'}</span>`
                + `<span class="row-counts"><span class="row-done">${done}</span><span class="row-total"> / ${total}</span></span>`
                + `</div>`
                + `</div>`;
        });

        container.innerHTML = html || '<div class="empty-msg">No results</div>';
    }

    function toggleGroupFlat(key, header) {
        const isOpen = _groupCollapsed[key] !== false;
        _groupCollapsed[key] = isOpen ? false : true;
        const chevron = header.querySelector('.group-chevron');
        if (chevron) chevron.classList.toggle('collapsed', !isOpen);
        // re-render to show/hide children
        applyFilters();
        _saveState();
    }

    function selectTask(id) {
        if (selectedTaskId === id) {
            selectedTaskId = null;
            applyFilters();
            document.getElementById('detailTaskId').textContent = '';
            document.getElementById('logsArea').classList.remove('visible');
            _closeSse();
            _showHeatmap();
            _saveState();
            return;
        }
        selectedTaskId = id;
        const task = allTasks.find(t => t.Id === id);
        if (!task) return;

        // auto-expand group if collapsed
        const proj = getProject(task);
        if (_groupCollapsed[proj] === false) _groupCollapsed[proj] = true;

        applyFilters();
        renderDetail(task);
        _saveState();
    }

    function _closeSse() {
        if (_sseLog)  { _sseLog.close();  _sseLog  = null; }
        if (_sseHttp) { _sseHttp.close(); _sseHttp = null; }
    }

    function _appendLogEntry(log) {
        const c = document.getElementById('lpLogsContent');
        const empty = c.querySelector('.lp-empty');
        if (empty) empty.remove();
        const lvl = (log.level || '').toUpperCase();
        const div = document.createElement('div');
        div.className = `tl-entry ${lvl}`;
        div.innerHTML = `
            <div class="tl-header">
                <span class="tl-ts">${log.timestamp ? new Date(log.timestamp).toLocaleTimeString() : ''}</span>
                <span class="tl-lvl ${lvl}">${lvl}</span>
                <span class="tl-acc">${escHtml(log.account || '')}</span>
            </div>
            <div class="tl-msg">${escHtml(log.message || '')}</div>`;
        c.appendChild(div);
        c.scrollTop = c.scrollHeight;
    }

    function _appendHttpEntry(log) {
        const c = document.getElementById('lpHttpContent');
        const empty = c.querySelector('.lp-empty');
        if (empty) empty.remove();
        const method = log.method || '';
        const sc = log.statusCode || 0;
        const scClass = sc>=200&&sc<300?'s2xx':sc>=300&&sc<400?'s3xx':sc>=400&&sc<500?'s4xx':'s5xx';
        const ts = log.timestamp ? new Date(log.timestamp).toLocaleTimeString() : '';
        const div = document.createElement('div');
        div.className = 'th-entry';
        div.innerHTML = `
            <span class="tl-ts">${ts}</span>
            <span class="th-method ${method}">${method}</span>
            <span class="th-url" title="${escHtml(log.url||'')}">${escHtml(log.url||'')}</span>
            <span class="th-status ${scClass}">${sc}</span>
            <span class="th-dur">${log.durationMs ? log.durationMs+'ms' : '-'}</span>
            <span class="th-acc">${escHtml(log.account||'-')}</span>`;
        c.appendChild(div);
        c.scrollTop = c.scrollHeight;
    }

    function showLogsArea(taskId) {
        _closeSse();
        _currentTaskId = taskId;
        document.getElementById('logsArea').classList.add('visible');

        // Initial fetch (history)
        refreshTaskLogs();
        refreshTaskHttp();

        // SSE for live updates
        _sseLog = new EventSource(`${SERVER}/logs/stream?task_id=${encodeURIComponent(taskId)}`);
        _sseLog.onmessage = e => {
            try { _appendLogEntry(JSON.parse(e.data)); } catch {}
        };

        _sseHttp = new EventSource(`${SERVER}/http-logs/stream?task_id=${encodeURIComponent(taskId)}`);
        _sseHttp.onmessage = e => {
            try { _appendHttpEntry(JSON.parse(e.data)); } catch {}
        };
    }

    async function refreshTaskLogs() {
        if (!_currentTaskId) return;
        const level = document.getElementById('lp_level')?.value || '';
        const limit = document.getElementById('lp_limit')?.value || 50;
        let url = `${SERVER}/logs?limit=${limit}&task_id=${encodeURIComponent(_currentTaskId)}`;

        try {
            const r = await fetch(url);

            const c = document.getElementById('lpLogsContent');
            if (!logs.length) { c.innerHTML = '<div class="lp-empty">No logs</div>'; return; }

                        <span class="tl-ts">${log.timestamp ? new Date(log.timestamp).toLocaleTimeString() : ''}</span>
                        <span class="tl-lvl ${log.level || ''}">${log.level || ''}</span>
                        <span class="tl-acc">${escHtml(log.account || '')}</span>
                    </div>
                    <div class="tl-msg">${escHtml(log.message || '')}</div>

    async function refreshTaskHttp() {
        if (!_currentTaskId) return;
        const method = document.getElementById('lp_method')?.value || '';
        const status = document.getElementById('lp_status')?.value || '';
        const url    = document.getElementById('lp_url')?.value || '';

        let apiUrl = `${SERVER}/http-logs?limit=${limit}&task_id=${encodeURIComponent(_currentTaskId)}`;
        if (method) apiUrl += `&method=${encodeURIComponent(method)}`;
        if (status) apiUrl += `&status=${encodeURIComponent(status)}`;

        try {
            const r = await fetch(apiUrl);
            const logs = await r.json();
            const c = document.getElementById('lpHttpContent');
            if (!logs.length) { c.innerHTML = '<div class="lp-empty">No traffic</div>'; return; }
            c.innerHTML = logs.map(log => {

                const sc = log.statusCode || 0;
                const scClass = sc>=200&&sc<300?'s2xx':sc>=300&&sc<400?'s3xx':sc>=400&&sc<500?'s4xx':'s5xx';

    function initLogsResizer() {
        const resizer    = document.getElementById('logsResizer');
        const leftPanel  = document.getElementById('lpLogsPanel');
        const rightPanel = document.getElementById('lpHttpPanel');
        const container  = document.getElementById('logsArea');
        if (!resizer) return;
        let active = false;

        // restore
        const savedPct = localStorage.getItem('pm_logs_pct');
        if (savedPct) {
            leftPanel.style.flex  = `0 0 ${savedPct}%`;
            rightPanel.style.flex = '1 1 0';
        }

        resizer.addEventListener('mousedown', e => {
            active = true;
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });
        document.addEventListener('mousemove', e => {
            if (!active) return;
            const rect = container.getBoundingClientRect();
            const pct = ((e.clientX - rect.left) / rect.width) * 100;
            leftPanel.style.flex  = `0 0 ${pct}%`;
            rightPanel.style.flex = '1 1 0';
        });
        document.addEventListener('mouseup', () => {
            if (!active) return;
            active = false;
            document.body.style.cursor = ''; document.body.style.userSelect = '';
            const rect = container.getBoundingClientRect();
            const pct = (leftPanel.getBoundingClientRect().width / rect.width) * 100;
            localStorage.setItem('pm_logs_pct', pct.toFixed(1));
        });
    }

    function initHResizers() {
        const detail   = document.querySelector('.detail-panel');
        const logsArea = document.getElementById('logsArea');
        const commands = document.querySelector('.commands-panel');

        function makeRowResizer(resizerId, topEl, botEl, saveKeyTop, saveKeyBot) {
            const r = document.getElementById(resizerId);
            if (!r) return;

            // restore
            const savedTop = localStorage.getItem(saveKeyTop);
            const savedBot = localStorage.getItem(saveKeyBot);
            if (savedTop) topEl.style.flex = `0 0 ${savedTop}px`;
            if (savedBot) botEl.style.flex = `0 0 ${savedBot}px`;

            let active = false, startY, startTopH, startBotH;
            r.addEventListener('mousedown', e => {
                active    = true;
                startY    = e.clientY;
                startTopH = topEl.getBoundingClientRect().height;
                startBotH = botEl.getBoundingClientRect().height;
                document.body.style.cursor     = 'row-resize';
                document.body.style.userSelect = 'none';
                e.preventDefault();
            });
            document.addEventListener('mousemove', e => {
                if (!active) return;
                const dy     = e.clientY - startY;
                const newTop = Math.max(40, startTopH + dy);
                const newBot = Math.max(40, startBotH - dy);
                topEl.style.flex = `0 0 ${newTop}px`;
                botEl.style.flex = `0 0 ${newBot}px`;
            });
            document.addEventListener('mouseup', () => {
                if (!active) return;
                active = false;
                document.body.style.cursor = ''; document.body.style.userSelect = '';
                localStorage.setItem(saveKeyTop, topEl.getBoundingClientRect().height);
                localStorage.setItem(saveKeyBot, botEl.getBoundingClientRect().height);
            });
        }

        makeRowResizer('hResizerTop', detail, logsArea,  'pm_h_detail',   'pm_h_logs');
        makeRowResizer('hResizerBot', logsArea, commands, 'pm_h_logs',     'pm_h_cmds');
    }

    // ── PM → Scheduler payload export ──
    function _pmTypeToSchemaType(t) {
        switch (t) {
            case 'Tab':                 return 'tab';
            case 'Comment':             return 'section';
            case 'Boolean':             return 'boolean';
            case 'DropDown':            return 'select';
            case 'DropDownMultiSelect': return 'multiselect';
            case 'Password':            return 'password';
            default:                    return 'text';
        }
    }

    async function copySettingsPayload() {
        if (!modalFields.length) return;

        // Build schema — strip {opts} from label, put in options field
        const schema = modalFields.map(f => {
            const type = _pmTypeToSchemaType(f.type);
            const optMatch = (f.label || '').match(/\{([^}]+)\}/);
            const cleanLabel = (f.label || '').replace(/\{[^}]+\}/g, '').trim() || f.key || '';
            const item = { key: f.key || '', label: cleanLabel, type };
            if (optMatch && (type === 'select' || type === 'multiselect'))
                item.options = optMatch[1].split('|').map(function(s) { return s.trim(); }).join(', ');
            if (f.help) item.help = f.help;
            return item;
        });

        // Read current DOM values
        const values = {};
        document.querySelectorAll('#modalBody [data-key]').forEach(function(el) {
            values[el.dataset.key] = el.type === 'checkbox' ? (el.checked ? 'True' : 'False') : el.value;
        });
        document.querySelectorAll('#modalBody [data-multi]').forEach(function(el) {
            const k = el.dataset.multi;
            if (!values[k]) values[k] = [];
            if (el.checked) values[k].push(el.value);
        });
        for (const k in values) {
            if (Array.isArray(values[k])) values[k] = values[k].join(', ');
        }

        const payload = { schema: JSON.stringify(schema), values: JSON.stringify(values) };
        try {
            await navigator.clipboard.writeText(JSON.stringify(payload));
            const btn = document.getElementById('copyPayloadBtn');
            const orig = btn.textContent;
            btn.textContent = '✓ Copied';

    function renderModalFields(fields) {
        const body = document.getElementById('modalBody');

        if (!fields.length) {
            body.innerHTML = '<div class="empty-msg">No settings found</div>';
            tabsEl.innerHTML = '';
            return;
        }

        const tabs = [];
        let currentTab = { name: 'Global', fields: [] };

        for (const f of fields) {
            if (f.type === 'Tab') {
                if (currentTab.fields.length > 0 || tabs.length === 0) tabs.push(currentTab);
                const tabLabel = f.label.replace(/[{}]/g, '').trim() || f.key || 'Tab';
                currentTab = { name: tabLabel, fields: [] };
            } else {
                currentTab.fields.push(f);
            }
        }
        tabs.push(currentTab);

        tabsEl.innerHTML = tabs.map((t, i) =>
            `<button class="modal-tab ${i === 0 ? 'active' : ''}" onclick="switchTab(${i})">${escHtml(t.name)}</button>`
        ).join('');

        body.innerHTML = tabs.map((t, i) =>
            `<div class="tab-pane ${i === 0 ? 'active' : ''}" id="tab-pane-${i}">${renderFieldsHtml(t.fields)}</div>`

    function switchTab(idx) {
        document.querySelectorAll('.modal-tab').forEach((el, i) => el.classList.toggle('active', i === idx));

    function renderFieldsHtml(fields) {
        let html = '';
        for (const f of fields) {
            if (f.type === 'Comment') {
                const label = f.label.replace(/[▪◆►•]+/g, '').replace(/\s+/g, ' ').trim();
                if (label.length > 2) html += `<div class="section-divider">${escHtml(label.slice(0, 100))}</div>`;
                continue;
            }
            if (!f.key) continue;

            const cleanLabel = f.label.replace(/\{[^}]+\}/g, '').trim() || f.key;
            const labelHtml = `<span class="field-label">${escHtml(cleanLabel)}<span class="field-key">${escHtml(f.key)}</span></span>`;

            if (f.type === 'Boolean') {
                const checked = f.value === 'True' || f.value === 'true' ? 'checked' : '';
                html += `<div class="field-group">${labelHtml}<div class="field-bool"><input type="checkbox" id="f_${escHtml(f.key)}" data-key="${escHtml(f.key)}" ${checked}><label for="f_${escHtml(f.key)}" style="color:#8b949e;font-size:10px;">${f.value || 'False'}</label></div></div>`;
            } else if (f.type === 'DropDown') {
                const optMatch = f.label.match(/\{([^}]+)\}/);
                if (optMatch) {
                    const opts = optMatch[1].split('|').map(o => o.trim());
                    const optsHtml = opts.map(o => `<option value="${escHtml(o)}" ${o === f.value ? 'selected' : ''}>${escHtml(o)}</option>`).join('');
                    html += `<div class="field-group">${labelHtml}<select class="field-select" data-key="${escHtml(f.key)}">${optsHtml}</select></div>`;
                } else {
                    html += `<div class="field-group">${labelHtml}<input class="field-input" data-key="${escHtml(f.key)}" value="${escHtml(f.value)}"></div>`;
                }
            } else if (f.type === 'DropDownMultiSelect') {
                const optMatch = f.label.match(/\{([^}]+)\}/);
                const selected = (f.value || '').split(',').map(s => s.trim());
                if (optMatch) {
                    const opts = optMatch[1].split('|').map(o => o.trim());
                    const checkboxes = opts.map(o =>
                        `<label><input type="checkbox" data-multi="${escHtml(f.key)}" value="${escHtml(o)}" ${selected.includes(o) ? 'checked' : ''}><span>${escHtml(o)}</span></label>`
                    ).join('');
                    html += `<div class="field-group">${labelHtml}<div class="field-multiselect">${checkboxes}</div></div>`;
                } else {
                    html += `<div class="field-group">${labelHtml}<input class="field-input" data-key="${escHtml(f.key)}" value="${escHtml(f.value)}"></div>`;
                }
            } else if (f.type === 'FileName' || f.type === 'Label') {
                html += `<div class="field-group">${labelHtml}<input class="field-input" data-key="${escHtml(f.key)}" value="${escHtml(f.value)}" placeholder="${escHtml(f.help || '')}"></div>`;
            } else {
                const isLong = (f.value || '').length > 60;
                if (isLong) {
                    html += `<div class="field-group">${labelHtml}<textarea class="field-textarea" data-key="${escHtml(f.key)}">${escHtml(f.value)}</textarea></div>`;
                } else {
                    html += `<div class="field-group">${labelHtml}<input class="field-input" data-key="${escHtml(f.key)}" value="${escHtml(f.value)}"></div>`;
                }
            }
        }
        return html || '<div class="empty-msg" style="padding:16px 0">No fields in this tab</div>';
    }

    // ── Universal Dialog ──
    const _dialog = {
        _resolve: null, _overlay: null,
        _open(icon, title, msg, mode, defaultVal) {
            const ov = document.getElementById('dialogOverlay');
            document.getElementById('dialogIcon').textContent = icon;
            document.getElementById('dialogTitle').textContent = title;
            document.getElementById('dialogMsg').textContent = msg;
            const inp = document.getElementById('dialogInput');
            inp.style.display = mode === 'prompt' ? 'block' : 'none';
            inp.value = defaultVal || '';
            this._overlay = ov;
            ov.classList.add('open');
            if (mode === 'prompt') setTimeout(() => inp.focus(), 50);
            return new Promise(res => { this._resolve = res; });
        },
        _close(val) {
            this._overlay?.classList.remove('open');
            document.getElementById('dialogButtons').innerHTML = '';
            if (this._resolve) { this._resolve(val); this._resolve = null; }
        },
        _buttons(btns) {
            const container = document.getElementById('dialogButtons');
            container.innerHTML = '';
            btns.forEach(({label, cls, val}) => {
                const b = document.createElement('button');
                b.className = 'dialog-btn ' + (cls || '');
                b.textContent = label;
                b.onclick = () => {
                    const v = val === '__INPUT__' ? document.getElementById('dialogInput').value.trim() : val;
                    this._close(v);
                };
                container.appendChild(b);
            });
        },
        alert(msg, title = 'Info', icon = 'ℹ️') {
            this._buttons([{ label: 'OK', cls: 'primary', val: true }]);
            return this._open(icon, title, msg, 'alert');
        },
        confirm(msg, title = 'Confirm', danger = false) {
            this._buttons([{ label: 'Cancel', cls: '', val: false }, { label: 'Confirm', cls: danger ? 'danger' : 'primary', val: true }]);
            return this._open('⚠️', title, msg, 'confirm');
        },
        prompt(msg, title = 'Input', defaultVal = '') {
            const inp = document.getElementById('dialogInput');
            this._buttons([{ label: 'Cancel', cls: '', val: null }, { label: 'OK', cls: 'primary', val: '__INPUT__' }]);
            const p = this._open('✏️', title, msg, 'prompt', defaultVal);
            const handler = (e) => {
                if (e.key === 'Enter') { inp.removeEventListener('keydown', handler); this._close(inp.value.trim()); }
                if (e.key === 'Escape') { inp.removeEventListener('keydown', handler); this._close(null); }
            };
            inp.addEventListener('keydown', handler);
            return p;
        },
        error(msg, title = 'Error') { return this.alert(msg, title, '❌'); }
    };
