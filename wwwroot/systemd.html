<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>z3nIO | Systemd</title>
    <link rel="stylesheet" href="/css/themes.css">
    <script src="/js/theme.js"></script>
    <script src="/js/nav.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            font-size: 13px; overflow: hidden; height: 100vh;
        }
        #app { width: 100%; height: 100vh; display: flex; flex-direction: column; }

        .main-header {
            background: var(--bg1); padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 16px;
        }
        .main-header h1 { font-size: 18px; font-weight: 700; color: var(--accent); }
        .header-controls { margin-left: auto; display: flex; gap: 12px; align-items: center; }
        .filter-input {
            padding: 6px 12px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text);
            border-radius: 4px; font-size: 13px; min-width: 200px;
        }
        .status-filter {
            padding: 6px 12px; border: 1px solid var(--border);
            background: var(--bg); color: var(--text);
            border-radius: 4px; font-size: 13px; cursor: pointer;
        }
        .refresh-btn {
            padding: 6px 16px; background: var(--accent);
            color: white; border: none; border-radius: 4px;
            cursor: pointer; font-size: 13px; transition: opacity 0.2s;
        }
        .refresh-btn:hover { opacity: 0.8; }

        .content { flex: 1; overflow-y: auto; padding: 20px; }

        .services-table {
            width: 100%; border-collapse: collapse;
            background: var(--bg1); border: 1px solid var(--border);
            border-radius: 8px; overflow: hidden;
        }
        .services-table thead {
            background: var(--bg); border-bottom: 2px solid var(--border);
        }
        .services-table th {
            padding: 12px 16px; text-align: left;
            font-size: 12px; font-weight: 600;
            color: var(--text2); text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .services-table tbody tr {
            border-bottom: 1px solid var(--border);
            cursor: pointer; transition: background 0.2s;
        }
        .services-table tbody tr:hover {
            background: var(--bg);
        }
        .services-table tbody tr.status-active {
            border-left: 3px solid #4caf50;
        }
        .services-table tbody tr.status-failed {
            border-left: 3px solid #f44336;
        }
        .services-table tbody tr.status-inactive {
            border-left: 3px solid #757575;
        }
        .services-table td {
            padding: 12px 16px; font-size: 13px;
            color: var(--text);
        }
        .service-name {
            font-weight: 600; color: var(--text);
            font-size: 13px;
        }
        .status-badge {
            padding: 4px 8px; border-radius: 4px;
            font-size: 11px; font-weight: 600;
            text-transform: uppercase; display: inline-block;
        }
        .status-badge.status-active {
            background: rgba(76, 175, 80, 0.2); color: #4caf50;
        }
        .status-badge.status-failed {
            background: rgba(244, 67, 54, 0.2); color: #f44336;
        }
        .status-badge.status-inactive {
            background: rgba(117, 117, 117, 0.2); color: #9e9e9e;
        }
        .metric-cell {
            font-family: "Courier New", monospace;
            font-size: 12px; color: var(--text2);
        }
        .metric-value {
            color: var(--text);
        }
        .metric-good { color: #4caf50; }
        .metric-warn { color: #ff9800; }
        .metric-bad { color: #f44336; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7); display: none;
            align-items: center; justify-content: center; z-index: 1000;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: var(--bg); border: 1px solid var(--border);
            border-radius: 8px; max-width: 900px; width: 100%;
            max-height: 90vh; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .modal-header {
            display: flex; justify-content: space-between;
            align-items: center; padding: 20px;
            border-bottom: 1px solid var(--border);
        }
        .modal-header h2 {
            margin: 0; font-size: 18px; color: var(--text);
        }
        .close-btn {
            background: none; border: none; font-size: 32px;
            color: var(--text2); cursor: pointer;
            padding: 0; width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
        }
        .close-btn:hover { color: var(--text); }

        .modal-body { padding: 20px; overflow-y: auto; }
        .action-buttons {
            display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .action-buttons button {
            padding: 8px 16px; border: none; border-radius: 4px;
            cursor: pointer; font-size: 13px; font-weight: 500;
            transition: opacity 0.2s;
        }
        .action-buttons button:hover { opacity: 0.8; }
        .btn-start { background: #4caf50; color: white; }
        .btn-stop { background: #f44336; color: white; }
        .btn-restart { background: #ff9800; color: white; }
        .btn-enable { background: #2196f3; color: white; }
        .btn-disable { background: #757575; color: white; }

        .details-section { margin-bottom: 24px; }
        .details-section h3 {
            margin: 0 0 12px 0; font-size: 15px; color: var(--text);
            border-bottom: 1px solid var(--border); padding-bottom: 8px;
        }
        .status-output, .logs-output {
            background: var(--bg1); border: 1px solid var(--border);
            border-radius: 4px; padding: 12px;
            font-family: "Courier New", monospace; font-size: 12px;
            color: var(--text); overflow-x: auto;
            white-space: pre-wrap; word-wrap: break-word;
            max-height: 300px; overflow-y: auto;
        }
        .properties-grid { display: grid; gap: 8px; }
        .property-row {
            display: grid; grid-template-columns: 200px 1fr;
            gap: 12px; padding: 8px; background: var(--bg1);
            border-radius: 4px; font-size: 12px;
        }
        .property-key { font-weight: 600; color: var(--text2); }
        .property-value { color: var(--text); word-break: break-all; }

        .loading, .error {
            text-align: center; padding: 40px;
            font-size: 15px; color: var(--text2);
        }
        .error { color: #f44336; }
    </style>
</head>
<body>
    <div id="app">
        <div class="main-header">
            <h1>Systemd Services</h1>
            <div class="header-controls">
                <input type="text" id="filterInput" placeholder="Filter services..." class="filter-input">
                <select id="statusFilter" class="status-filter">
                    <option value="all">All</option>
                    <option value="active">Active</option>
                    <option value="failed">Failed</option>
                    <option value="inactive">Inactive</option>
                </select>
                <button id="refreshBtn" class="refresh-btn">Refresh</button>
            </div>
        </div>
        <div class="content">
            <table id="servicesTable" class="services-table">
                <thead>
                    <tr>
                        <th>Service</th>
                        <th>Status</th>
                        <th>CPU</th>
                        <th>Memory</th>
                        <th>PID</th>
                        <th>Uptime</th>
                        <th>Tasks</th>
                    </tr>
                </thead>
                <tbody id="servicesBody"></tbody>
            </table>
        </div>
    </div>

    <div id="modal" class="modal-overlay">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <script>
        let services = [];
        let servicesDetails = new Map();
        let selectedService = null;

        async function loadServices() {
            try {
                const res = await fetch("/systemd/list");
                const data = await res.json();
                services = data.services || [];

                // Load details for active services
                const activeServices = services.filter(s => s.active === "active").slice(0, 50);
                await Promise.all(activeServices.map(async s => {
                    try {
                        const detailRes = await fetch(`/systemd/status/${encodeURIComponent(s.unit)}`);
                        const detailData = await detailRes.json();
                        servicesDetails.set(s.unit, detailData.properties || {});
                    } catch (e) {
                        // Ignore errors for individual services
                    }
                }));

                renderServices();
            } catch (err) {
                document.getElementById("servicesBody").innerHTML = `<tr><td colspan="7" class="error">Error: ${err.message}</td></tr>`;
            }
        }

        function formatBytes(bytes) {
            if (!bytes || bytes === "0" || bytes === "[not set]") return "-";
            const num = parseInt(bytes);
            if (isNaN(num)) return "-";
            if (num < 1024) return num + " B";
            if (num < 1024 * 1024) return (num / 1024).toFixed(1) + " KB";
            if (num < 1024 * 1024 * 1024) return (num / (1024 * 1024)).toFixed(1) + " MB";
            return (num / (1024 * 1024 * 1024)).toFixed(2) + " GB";
        }

        function formatCPU(nsec) {
            if (!nsec || nsec === "0" || nsec === "[not set]") return "-";
            const num = parseInt(nsec);
            if (isNaN(num)) return "-";
            const seconds = num / 1e9;
            if (seconds < 60) return seconds.toFixed(1) + "s";
            if (seconds < 3600) return (seconds / 60).toFixed(1) + "m";
            return (seconds / 3600).toFixed(1) + "h";
        }

        function formatUptime(timestamp) {
            if (!timestamp || timestamp === "0" || timestamp === "[not set]") return "-";
            const startTime = new Date(parseInt(timestamp) / 1000);
            if (isNaN(startTime.getTime())) return "-";
            const now = new Date();
            const diff = now - startTime;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            if (days > 0) return `${days}d ${hours}h`;
            if (hours > 0) return `${hours}h ${minutes}m`;
            return `${minutes}m`;
        }

        function getMemoryClass(bytes) {
            const num = parseInt(bytes);
            if (isNaN(num)) return "";
            if (num > 1024 * 1024 * 1024) return "metric-bad";
            if (num > 512 * 1024 * 1024) return "metric-warn";
            return "metric-good";
        }

        function renderServices() {
            const filter = document.getElementById("filterInput").value.toLowerCase();
            const statusFilter = document.getElementById("statusFilter").value;

            const filtered = services.filter(s => {
                const matchesName = (s.unit || "").toLowerCase().includes(filter) ||
                                   (s.description || "").toLowerCase().includes(filter);
                const matchesStatus = statusFilter === "all" ||
                                     (statusFilter === "active" && s.active === "active") ||
                                     (statusFilter === "failed" && s.active === "failed") ||
                                     (statusFilter === "inactive" && s.active === "inactive");
                return matchesName && matchesStatus;
            });

            const tbody = document.getElementById("servicesBody");
            if (filtered.length === 0) {
                tbody.innerHTML = "<tr><td colspan='7' class='loading'>No services found</td></tr>";
                return;
            }

            tbody.innerHTML = filtered.map(s => {
                const props = servicesDetails.get(s.unit) || {};
                const memory = formatBytes(props.MemoryCurrent);
                const cpu = formatCPU(props.CPUUsageNSec);
                const pid = props.MainPID && props.MainPID !== "0" ? props.MainPID : "-";
                const uptime = formatUptime(props.ExecMainStartTimestamp);
                const tasks = props.TasksCurrent || "-";
                const memClass = getMemoryClass(props.MemoryCurrent);

                return `
                    <tr class="status-${s.active}" onclick="openModal('${s.unit.replace(/'/g, "\\'")}')">
                        <td><span class="service-name">${s.unit}</span></td>
                        <td><span class="status-badge status-${s.active}">${s.active}</span></td>
                        <td class="metric-cell"><span class="metric-value">${cpu}</span></td>
                        <td class="metric-cell"><span class="metric-value ${memClass}">${memory}</span></td>
                        <td class="metric-cell"><span class="metric-value">${pid}</span></td>
                        <td class="metric-cell"><span class="metric-value">${uptime}</span></td>
                        <td class="metric-cell"><span class="metric-value">${tasks}</span></td>
                    </tr>
                `;
            }).join("");
        }

        async function openModal(serviceName) {
            selectedService = serviceName;
            document.getElementById("modalTitle").textContent = serviceName;
            document.getElementById("modal").classList.add("active");
            document.getElementById("modalBody").innerHTML = "<div class='loading'>Loading details...</div>";

            try {
                const [statusRes, logsRes] = await Promise.all([
                    fetch(`/systemd/status/${encodeURIComponent(serviceName)}`),
                    fetch(`/systemd/logs/${encodeURIComponent(serviceName)}?lines=50`)
                ]);

                const statusData = await statusRes.json();
                const logsData = await logsRes.json();

                const props = statusData.properties || {};
                const importantProps = ["Id", "Description", "LoadState", "ActiveState", "SubState",
                    "MainPID", "ExecStart", "ExecMainStartTimestamp", "MemoryCurrent",
                    "CPUUsageNSec", "TasksCurrent", "Requires", "After", "Before"];

                document.getElementById("modalBody").innerHTML = `
                    <div class="action-buttons">
                        <button class="btn-start" onclick="handleAction('start')">Start</button>
                        <button class="btn-stop" onclick="handleAction('stop')">Stop</button>
                        <button class="btn-restart" onclick="handleAction('restart')">Restart</button>
                        <button class="btn-enable" onclick="handleAction('enable')">Enable</button>
                        <button class="btn-disable" onclick="handleAction('disable')">Disable</button>
                    </div>
                    <div class="details-section">
                        <h3>Status</h3>
                        <pre class="status-output">${statusData.status_text}</pre>
                    </div>
                    <div class="details-section">
                        <h3>Properties</h3>
                        <div class="properties-grid">
                            ${importantProps.filter(k => props[k]).map(k => `
                                <div class="property-row">
                                    <span class="property-key">${k}:</span>
                                    <span class="property-value">${props[k]}</span>
                                </div>
                            `).join("")}
                        </div>
                    </div>
                    <div class="details-section">
                        <h3>Recent Logs (50 lines)</h3>
                        <pre class="logs-output">${logsData.logs}</pre>
                    </div>
                `;
            } catch (err) {
                document.getElementById("modalBody").innerHTML = `<div class="error">Error: ${err.message}</div>`;
            }
        }

        function closeModal() {
            document.getElementById("modal").classList.remove("active");
            selectedService = null;
        }

        async function handleAction(action) {
            if (!selectedService) return;

            try {
                const res = await fetch(`/systemd/${action}/${encodeURIComponent(selectedService)}`, {
                    method: "POST"
                });

                if (!res.ok) {
                    const data = await res.json();
                    throw new Error(data.detail || "Action failed");
                }

                await loadServices();
                await openModal(selectedService);
            } catch (err) {
                alert(`Failed to ${action} service: ${err.message}`);
            }
        }

        document.getElementById("filterInput").addEventListener("input", renderServices);
        document.getElementById("statusFilter").addEventListener("change", renderServices);
        document.getElementById("refreshBtn").addEventListener("click", loadServices);
        document.getElementById("modal").addEventListener("click", closeModal);

        loadServices();
        setInterval(loadServices, 5000);
    </script>
</body>
</html>
