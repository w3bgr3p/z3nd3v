<!doctype html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/themes.css">
    <script src="/js/theme.js"></script>
    <script src="/js/nav.js"></script>
    <script src="/js/icons.js"></script>

    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/javascript/javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.17/mode/python/python.min.js"></script>

    <title>z3nIO | Scheduler</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 11px; overflow: hidden; height: 100vh;
            display: flex; justify-content: center;
        }
        #app { width: 100%; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        .main-header { background: var(--bg1); padding: 6px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; align-items: center; gap: 10px; }
        .main-header h1 { font-size: 13px; font-weight: 700; color: var(--accent); }
        .header-stats { display: flex; gap: 14px; font-size: 10px; color: var(--text2); }
        .stat-item { display: flex; gap: 4px; align-items: center; }
        .stat-val     { color: var(--text); font-weight: 600; }
        .stat-running { color: var(--green); }
        .stat-error   { color: var(--red); }
        .header-right { margin-left: auto; display: flex; gap: 6px; align-items: center; }

        .content { display: flex; flex: 1; overflow: hidden; gap: 5px; padding: 5px; }
        .tasks-panel { width: 340px; flex-shrink: 0; display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; background: var(--bg); }
        .list-scroll { flex: 1; overflow-y: auto; }

        .group-header { padding: 5px 10px 4px; display: flex; align-items: center; gap: 6px; background: var(--bg1); border-top: 2px solid var(--border); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 2; cursor: pointer; user-select: none; }
        .group-header:hover { background: var(--bg2); }
        .group-dot    { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
        .group-name   { font-size: 10px; font-weight: 700; color: var(--text); text-transform: uppercase; letter-spacing: 0.5px; flex: 1; }
        .group-count  { font-size: 9px; color: var(--text2); background: var(--bg2); padding: 1px 5px; border-radius: 8px; }
        .group-chevron { font-size: 9px; color: var(--text2); transition: transform 0.15s; display: inline-block; }
        .group-chevron.collapsed { transform: rotate(-90deg); }

        .schedule-row { padding: 6px 10px 6px 18px; border-bottom: 1px solid var(--border); cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.08s; }
        .schedule-row.group-child { padding-left: 24px; border-left: 2px solid var(--border); }
        .schedule-row:hover    { background: var(--bg2); }
        .schedule-row.active   { background: var(--bg3); }
        .schedule-row.row-disabled { opacity: 0.45; }
        .ungrouped-separator   { border-top: 2px solid var(--border); }

        .row-dot         { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; cursor: pointer; }
        .row-dot.enabled  { background: var(--green); }
        .row-dot.disabled { background: var(--border); }
        .row-info  { flex: 1; min-width: 0; }
        .row-name  { font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .row-sub   { font-size: 9px; color: var(--text2); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .row-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; flex-shrink: 0; }
        .row-counts { font-size: 9px; color: var(--text2); display: flex; gap: 4px; align-items: center; }
        .row-done   { color: var(--green, #3fb950); font-weight: 600; }
        .row-total  { color: var(--text2); }

        .task-status { font-size: 9px; padding: 1px 7px; border-radius: 4px; text-align: center; font-weight: 400; letter-spacing: 0.2px; text-transform: uppercase; }
        .task-status.newbie  { background: var(--yellow-tint); color: var(--yellow); }
        .task-status.running { background: var(--green-tint); color: var(--text-hi); border: 1px solid var(--green-bg); }
        .task-status.done    { background: var(--purple-tint); color: var(--green); }
        .task-status.fail    { background: var(--red-tint); color: var(--red); border: 1px solid var(--red-bg); }
        .task-status.planned { background: var(--blue-tint); color: var(--accent); border: 1px solid var(--blue-border); }
        .task-status.paused  { background: var(--bg2); color: var(--text2); }

        .resizer   { width: 4px; cursor: col-resize; background: transparent; flex-shrink: 0; transition: background 0.15s; }
        .resizer:hover { background: var(--accent); opacity: 0.5; }

        .right-col    { flex: 1; display: flex; flex-direction: column; overflow: hidden; gap: 0; min-width: 0; }
        .detail-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); }

        .detail-header  { padding: 8px 14px 0; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--bg1); }
        .detail-title   { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
        .detail-sub     { font-size: 10px; color: var(--text2); margin-bottom: 6px; font-family: monospace; }
        .detail-actions { display: flex; gap: 5px; margin-bottom: 8px; flex-wrap: wrap; }
        .action-group   { display: flex; gap: 2px; padding: 2px 4px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg2); }

        .panel-header { background: var(--bg1); padding: 6px 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
        .panel-title  { font-size: 12px; font-weight: 600; color: var(--accent); }
        .count-badge  { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 1px 6px; font-size: 10px; color: var(--text2); }

        .exec-filter-bar { background: var(--bg1); padding: 3px 8px; border-bottom: 1px solid var(--border); display: flex; gap: 4px; flex-wrap: wrap; align-items: center; flex-shrink: 0; min-height: 24px; }
        .exec-filter-bar:empty { display: none; }
        .tag-filter-label { font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.4px; flex-shrink: 0; margin-right: 2px; }
        .tag-chip { font-size: 10px; padding: 1px 7px; border-radius: 10px; background: var(--bg2); border: 1px solid var(--border); color: var(--text2); cursor: pointer; user-select: none; transition: all 0.12s; white-space: nowrap; }
        .tag-chip:hover   { border-color: var(--accent); color: var(--text); }
        .tag-chip.active  { background: rgba(56,139,253,0.15); border-color: var(--accent); color: var(--accent); }
        .tag-chip.clear-chip { color: var(--text2); border-style: dashed; }
        .tag-chip.clear-chip:hover { color: var(--red, #f85149); border-color: var(--red, #f85149); }

        .detail-tabs { display: flex; gap: 0; }
        .dtab { padding: 5px 14px; cursor: pointer; font-size: 11px; color: var(--text2); border-bottom: 2px solid transparent; transition: color 0.1s; user-select: none; }
        .dtab:hover  { color: var(--text); }
        .dtab.active { color: var(--accent); border-bottom-color: var(--accent); }

        .detail-body { flex: 1; overflow-y: auto; padding: 12px 14px; }
        .empty-state { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text2); font-size: 12px; }

        .gs-rows { max-width: 320px; }

        .nav-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; width: 100%; max-width: 860px; }
        .nav-card { background: var(--surface, var(--bg1)); border: 1px solid var(--border); border-radius: var(--radius-lg, 8px); padding: 20px 22px; cursor: pointer; text-decoration: none; color: inherit; display: flex; flex-direction: column; gap: 8px; transition: border-color 0.15s, background 0.15s, transform 0.1s; position: relative; overflow: hidden; }
        .nav-card:hover { border-color: var(--card-color, var(--accent)); background: var(--surface2, var(--bg2)); transform: translateY(-1px); }
        .nav-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--card-color, var(--accent)); opacity: 0; transition: opacity 0.15s; }
        .nav-card:hover::before { opacity: 1; }
        .card-icon  { font-size: 24px; line-height: 1; }
        .card-icon svg { width: 32px; height: 32px; }
        .card-title { font-size: 14px; font-weight: 600; color: var(--text-hi, var(--text)); }
        .card-desc  { font-size: 11px; color: var(--text-dim, var(--text2)); line-height: 1.5; }
        .card-badge { margin-top: auto; padding-top: 10px; font-size: 10px; color: var(--card-color, var(--accent)); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; }

        .form-grid  { display: grid; grid-template-columns: 130px 1fr; gap: 7px 10px; align-items: start; max-width: 680px; }
        .form-label { color: var(--text2); padding-top: 5px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; }
        .form-input { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 4px 8px; color: var(--text); font-size: 11px; width: 100%; }
        .form-input:focus { outline: none; border-color: var(--accent); }
        select.form-input { cursor: pointer; }
        .form-section { grid-column: 1 / -1; margin-top: 6px; padding: 4px 0 4px 8px; border-left: 2px solid var(--accent); color: var(--text2); font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .form-actions { grid-column: 1 / -1; display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }

        .detail-grid    { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .detail-section { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 10px 12px; }
        .info-card-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--accent); margin-bottom: 8px; }
        .info-row { display: flex; justify-content: space-between; align-items: baseline; padding: 3px 0; border-bottom: 1px solid var(--border); }
        .info-row:last-child { border-bottom: none; }
        .info-key { font-size: 10px; color: var(--text2); }
        .info-val { font-size: 11px; color: var(--text); font-weight: 500; text-align: right; max-width: 65%; word-break: break-all; }
        .info-val.green  { color: var(--green, #3fb950); }
        .info-val.red    { color: var(--red, #f85149); }
        .info-val.accent { color: var(--accent); }

        .output-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; flex-shrink: 0; }
        .live-badge { font-size: 9px; padding: 2px 6px; border-radius: 3px; background: var(--green-bg, rgba(63,185,80,0.15)); color: var(--green, #3fb950); animation: blink 1.2s infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .output-box { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; overflow-y: auto; height: calc(100% - 40px); min-height: 100px; }
        .out-line { padding: 2px 10px; border-bottom: 1px solid var(--bg2); font-family: 'Consolas', monospace; font-size: 10px; line-height: 1.6; word-break: break-all; display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
        .out-line-text { flex: 1; min-width: 0; }
        .out-line-time { flex-shrink: 0; font-size: 8px; opacity: 0.35; color: var(--text2); font-family: 'Consolas', monospace; }
        .out-line.ERROR   { color: var(--red, #f85149); }
        .out-line.WARNING { color: var(--yellow, #d29922); }
        .out-line.INFO    { color: var(--text); }
        .out-line.DEBUG   { color: var(--text2); }
        .out-line.empty   { color: var(--text2); padding: 12px; text-align: center; display: block; }

        .h-resizer { height: 5px; background: var(--bg2); cursor: row-resize; flex-shrink: 0; margin: 1px 0; border-radius: 2px; }
        .h-resizer:hover { background: var(--accent); }
        .v-resizer { width: 4px; cursor: col-resize; background: transparent; flex-shrink: 0; transition: background 0.15s; }
        .v-resizer:hover { background: var(--accent); opacity: 0.5; }

        .bottom-panels { display: flex; flex-shrink: 0; height: 220px; gap: 0; overflow: hidden; }
        .log-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border); border-radius: 4px; background: var(--bg1); min-width: 80px; }
        .log-panel-header { padding: 4px 8px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
        .log-panel-title  { font-size: 10px; font-weight: 700; color: var(--accent); flex: 1; display: flex; align-items: center; gap: 5px; }
        .log-panel-title .icon { font-size: 11px; }
        .log-panel-filter { display: flex; gap: 4px; align-items: center; }
        .log-panel-filter select,
        .log-panel-filter input { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 2px 5px; color: var(--text); font-size: 10px; }
        .log-panel-filter select { cursor: pointer; }
        .log-panel-scroll { flex: 1; overflow-y: auto; font-family: 'Consolas', monospace; font-size: 10px; }
        .log-row  { display: flex; gap: 6px; padding: 2px 8px; border-bottom: 1px solid var(--border); align-items: baseline; }
        .log-row:hover { background: var(--bg2); }
        .log-time   { color: var(--text2); white-space: nowrap; flex-shrink: 0; font-size: 9px; }
        .log-level  { width: 40px; flex-shrink: 0; font-weight: 700; font-size: 9px; }
        .log-level.INFO  { color: var(--accent); }
        .log-level.WARN  { color: var(--yellow, #d29922); }
        .log-level.ERROR { color: var(--red, #f85149); }
        .log-acc    { width: 10px; flex-shrink: 0; color: var(--green, #3fb950); font-size: 9px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .log-caller { width: 200px; flex-shrink: 0; color: var(--text2); font-size: 9px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .log-msg    { flex: 1; color: var(--text); word-break: break-all; line-height: 1.5; }
        .http-row   { display: flex; gap: 6px; padding: 2px 8px; border-bottom: 1px solid var(--border); align-items: baseline; }
        .http-row:hover { background: var(--bg2); }
        .http-method { width: 35px; flex-shrink: 0; font-weight: 700; font-size: 9px; color: var(--accent); }
        .http-status { width: 28px; flex-shrink: 0; font-size: 9px; font-weight: 600; }
        .http-status.s2xx { color: var(--green, #3fb950); }
        .http-status.s4xx { color: var(--yellow, #d29922); }
        .http-status.s5xx { color: var(--red, #f85149); }
        .http-url   { flex: 1; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 9px; }
        .http-dur   { flex-shrink: 0; color: var(--text2); font-size: 9px; }
        .log-empty  { color: var(--text2); text-align: center; padding: 16px; font-size: 10px; }
        .panel-refresh { background: none; border: 1px solid var(--border); border-radius: 3px; color: var(--text2); cursor: pointer; font-size: 10px; padding: 1px 6px; }
        .panel-refresh:hover { color: var(--text); border-color: var(--text2); }

        .btn { padding: 4px 10px; border-radius: 3px; border: 1px solid var(--border); cursor: pointer; font-size: 11px; background: var(--bg2); color: var(--text); transition: opacity 0.1s; }
        .btn:hover   { background: var(--bg3); }
        .btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn.primary:hover { opacity: 0.85; }
        .btn.danger  { background: transparent; color: var(--red, #f85149); border-color: var(--red, #f85149); }
        .btn.danger:hover  { background: var(--red-bg, rgba(248,81,73,0.15)); }
        .btn.green   { background: transparent; color: var(--green, #3fb950); border-color: var(--green, #3fb950); }
        .btn.green:hover   { background: var(--green-bg, rgba(63,185,80,0.1)); }
        .btn.accent  { background: transparent; color: var(--accent); border-color: var(--accent); }
        .btn.sm      { padding: 2px 7px; font-size: 10px; }
        .btn.stop    { background: transparent; color: var(--red, #f85149); border-color: var(--red, #f85149); }

        .trigger-row { display: flex; gap: 8px; align-items: center; }
        .trigger-row .form-input { flex: 1; }
        .wd-btn { padding: 2px 7px; border-radius: 3px; border: 1px solid var(--border); cursor: pointer; font-size: 10px; background: var(--bg2); color: var(--text2); user-select: none; }
        .wd-btn.wd-on { background: var(--accent); color: #fff; border-color: var(--accent); }

        #dialogOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 1000; align-items: center; justify-content: center; }
        #dialogOverlay.open { display: flex; }
        #dialogBox { background: var(--bg1); border: 1px solid var(--border); border-radius: 6px; padding: 16px 20px; min-width: 260px; max-width: 380px; display: flex; flex-direction: column; gap: 10px; }
        #dialogTitle { font-weight: 700; font-size: 13px; }
        #dialogMsg   { color: var(--text2); font-size: 11px; line-height: 1.5; }
        #dialogInput { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 5px 8px; color: var(--text); font-size: 11px; display: none; width: 100%; }
        #dialogButtons { display: flex; gap: 8px; justify-content: flex-end; }

        .pm-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1001; align-items: center; justify-content: center; }
        .pm-overlay.open { display: flex; }
        .pm-modal { background: var(--bg1); border: 1px solid var(--border); border-radius: 6px; width: 620px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
        .pm-header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 9px; flex-shrink: 0; }
        .pm-header h3 { font-size: 13px; color: var(--text); flex: 1; }
        .pm-close { background: none; border: none; color: var(--text2); font-size: 16px; cursor: pointer; padding: 0 4px; line-height: 1; }
        .pm-close:hover { color: var(--text); }
        .pm-body   { flex: 1; overflow-y: auto; padding: 12px 14px; min-height: 0; }
        .pm-footer { padding: 8px 14px; border-top: 1px solid var(--border); display: flex; gap: 7px; justify-content: flex-end; flex-shrink: 0; }

        .schema-field-row { display: grid; grid-template-columns: 16px 1fr 110px 1fr 28px; gap: 6px; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--bg2); }
        .schema-field-row:last-child { border-bottom: none; }
        .schema-field-row.dragging  { opacity: 0.4; }
        .schema-field-row.drag-over { border-top: 2px solid var(--accent); }
        .schema-drag-handle { color: var(--text2); cursor: grab; font-size: 12px; display: flex; align-items: center; justify-content: center; user-select: none; opacity: 0.5; }
        .schema-drag-handle:hover { opacity: 1; color: var(--accent); }
        .schema-drag-handle:active { cursor: grabbing; }
        .schema-input { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 4px 7px; color: var(--text); font-size: 11px; width: 100%; }
        .schema-input:focus { outline: none; border-color: var(--accent); }
        .schema-del { background: none; border: 1px solid var(--border); border-radius: 3px; color: var(--text2); cursor: pointer; font-size: 12px; width: 28px; height: 26px; display: flex; align-items: center; justify-content: center; }
        .schema-del:hover { border-color: var(--red, #f85149); color: var(--red, #f85149); }
        .schema-col-header { display: grid; grid-template-columns: 16px 1fr 110px 1fr 28px; gap: 6px; padding: 0 0 5px; color: var(--text2); font-size: 9px; text-transform: uppercase; letter-spacing: 0.4px; border-bottom: 1px solid var(--border); margin-bottom: 4px; }
        .values-field  { margin-bottom: 10px; }
        .values-label  { font-size: 10px; color: var(--text2); margin-bottom: 3px; display: flex; gap: 6px; align-items: baseline; }
        .values-key    { font-size: 9px; color: var(--text2); font-family: monospace; opacity: 0.6; }
        .values-input  { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 4px 7px; color: var(--text); font-size: 11px; width: 100%; }
        .values-input:focus { outline: none; border-color: var(--accent); }
        .section-div   { margin: 8px 0 5px; padding: 3px 8px; background: var(--bg2); border-left: 2px solid var(--accent); border-radius: 0 3px 3px 0; font-size: 9px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.4px; }

        /* CodeMirror modal */
        .cm-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 2000; align-items: center; justify-content: center; }
        .cm-modal-overlay.open { display: flex; }
        .cm-modal { background: var(--bg1); border: 1px solid var(--border); border-radius: 6px; width: 720px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
        .cm-modal-header { padding: 10px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 9px; flex-shrink: 0; }
        .cm-modal-header h3 { font-size: 13px; color: var(--text); flex: 1; margin: 0; }
        .cm-modal-footer { padding: 8px 14px; border-top: 1px solid var(--border); display: flex; gap: 7px; justify-content: flex-end; flex-shrink: 0; }
        .cm-modal-body { flex: 1; overflow: auto; min-height: 0; }
        .cm-modal-body .CodeMirror { height: 100%; min-height: 340px; font-size: 12px; font-family: Consolas, monospace; }
        .cm-close { background: none; border: none; color: var(--text2); font-size: 16px; cursor: pointer; padding: 0 4px; line-height: 1; }
        .cm-close:hover { color: var(--text); }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>
<div id="app">
    <div class="main-header">
        <h1>Tasker</h1>
        <div class="header-stats" id="headerStats"></div>
        <div class="header-right">
            <button class="btn sm" onclick="AiPanel.toggleDefault()" style="border-color:var(--accent);color:var(--accent);">⟡ AI</button>
            <button class="btn sm" onclick="loadList()">↺</button>
        </div>
    </div>

    <div class="content">
        <div class="tasks-panel" id="tasksPanel">
            <div class="panel-header">
                <span class="panel-title">Schedules</span>
                <span class="count-badge" id="listCount">0</span>
                <div style="margin-left:auto;display:flex;gap:5px;">
                    <input type="text" id="searchInput" placeholder="Search..." oninput="filterList()"
                           style="background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:2px 7px;color:var(--text);font-size:10px;width:100px;">
                    <button class="btn sm" onclick="newSchedule()">+ New</button>
                </div>
            </div>
            <div class="exec-filter-bar" id="execFilterBar"></div>
            <div class="list-scroll" id="listScroll" onclick="if(!event.target.closest('.schedule-row'))deselect()"></div>
        </div>
        <div class="resizer" id="resizer"></div>

        <div class="right-col" id="rightCol">
            <div class="detail-panel" id="detailPanel">
                <div id="detailHeader" style="display:none" class="detail-header">
                    <div class="detail-title" id="detailTitle"></div>
                    <div class="detail-sub"   id="detailSub"></div>
                    <div class="detail-actions" id="detailActions"></div>
                    <div class="detail-tabs">
                        <div class="dtab active" data-tab="execution" onclick="switchTab('execution')">Execution</div>
                        <div class="dtab"        data-tab="settings"  onclick="switchTab('settings')">Settings</div>
                        <div class="dtab"        data-tab="logs"      onclick="switchTab('logs')">Logs</div>
                    </div>
                </div>
                <div class="detail-body" id="detailBody">
                    <div class="empty-state">Select a schedule or create a new one</div>
                </div>
            </div>

            <div class="h-resizer" id="hResizer" style="display:none"></div>

            <!-- Output box (bottom, always visible when task selected) -->
            <div id="bottomPanels" style="display:none;flex-shrink:0;height:220px;display:none;flex-direction:column;border:1px solid var(--border);border-radius:4px;overflow:hidden;background:var(--bg1);">
                <div class="log-panel-header">
                    <div class="log-panel-title"><span class="icon">▶</span> Output</div>
                    <span id="liveBadgeBottom" style="display:none;font-size:9px;padding:2px 6px;border-radius:3px;background:var(--green-bg,rgba(63,185,80,0.15));color:var(--green,#3fb950);animation:blink 1.2s infinite;">LIVE</span>
                    <div style="margin-left:auto;display:flex;gap:4px;align-items:center;">
                        <button class="panel-refresh" onclick="reloadOutput()" title="Refresh">↺</button>
                        <button class="panel-refresh" onclick="clearOutputBottom()" style="color:var(--red,#f85149);border-color:var(--red,#f85149);" title="Clear output">🗑</button>
                    </div>
                </div>
                <div id="outputBox" style="flex:1;overflow-y:auto;font-family:Consolas,monospace;font-size:10px;"><div class="out-line empty">(no output yet)</div></div>
            </div>
        </div>
    </div>
</div>

<!-- Dialog -->
<div id="dialogOverlay">
    <div id="dialogBox">
        <div style="display:flex;align-items:center;gap:9px;"><span id="dialogIcon"></span><span id="dialogTitle"></span></div>
        <div id="dialogMsg"></div>
        <input id="dialogInput" type="text" autocomplete="off">
        <div id="dialogButtons"></div>
    </div>
</div>

<!-- Schema modal -->
<div id="schemaOverlay" class="pm-overlay" onclick="if(event.target===this)closeSchemaModal()">
    <div class="pm-modal">
        <div class="pm-header"><h3 id="schemaTitle">Schema</h3><button class="pm-close" onclick="closeSchemaModal()">✕</button></div>
        <div class="pm-body" id="schemaBody"></div>
        <div class="pm-footer">
            <button class="btn" onclick="closeSchemaModal()">Cancel</button>
            <button class="btn primary" onclick="saveSchema()">Save Schema</button>
        </div>
    </div>
</div>

<!-- Values modal -->
<div id="valuesOverlay" class="pm-overlay" onclick="if(event.target===this)closeValuesModal()">
    <div class="pm-modal">
        <div class="pm-header"><h3 id="valuesTitle">Values</h3><button class="pm-close" onclick="closeValuesModal()">✕</button></div>
        <div class="pm-body" id="valuesBody"></div>
        <div class="pm-footer">
            <button class="btn" onclick="closeValuesModal()">Cancel</button>
            <button class="btn primary" onclick="saveValues()">Save Values</button>
        </div>
    </div>
</div>

<!-- Import payload modal -->
<div id="importPayloadOverlay" class="pm-overlay" onclick="if(event.target===this)closeImportPayload()">
    <div class="pm-modal" style="width:520px;">
        <div class="pm-header"><h3>Import Payload</h3><button class="pm-close" onclick="closeImportPayload()">✕</button></div>
        <div class="pm-body" style="padding:14px;">
            <div style="font-size:10px;color:var(--text2);margin-bottom:8px;">Paste <code style="background:var(--bg2);padding:1px 4px;border-radius:3px;">{"schema":"...","values":"..."}</code></div>
            <textarea id="importPayloadInput" style="width:100%;height:160px;background:var(--bg);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;font-family:monospace;padding:8px;resize:vertical;outline:none;box-sizing:border-box;" placeholder='{"schema":"[...]","values":"{...}"}'></textarea>
        </div>
        <div class="pm-footer">
            <button class="btn" onclick="closeImportPayload()">Cancel</button>
            <button class="btn primary" onclick="confirmImportPayload()">Apply</button>
        </div>
    </div>
</div>

<!-- CodeMirror config modal -->
<div id="cmOverlay" class="cm-modal-overlay" onclick="if(event.target===this)closeCmModal()">
    <div class="cm-modal">
        <div class="cm-modal-header">
            <h3 id="cmTitle">Config</h3>
            <button class="cm-close" onclick="closeCmModal()">✕</button>
        </div>
        <div class="cm-modal-body" id="cmBody"></div>
        <div class="cm-modal-footer">
            <button class="btn" onclick="closeCmModal()">Cancel</button>
            <button class="btn primary" onclick="saveCmConfig()">Save</button>
        </div>
    </div>
</div>

<script src="/js/ai-panel.js"></script>
<script src="/js/scheduler.js?v=1777149946"></script>
</body>
</html>
